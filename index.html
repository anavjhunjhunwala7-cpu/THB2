<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE HABIT BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --neon: #22c55e; --bg: #000000; --panel: #111111; --border: #222222; --nn: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        .fixed-header { 
            position: fixed; top: 0; width: 100%; height: 230px; 
            background: var(--bg); border-bottom: 1px solid var(--border); 
            z-index: 100; display: flex; flex-direction: column; align-items: center;
            padding-top: 15px;
        }

        .fixed-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); display: flex; height: 85px; }
        .content-area { margin-top: 240px; margin-bottom: 140px; padding: 20px; }
        
        .habit-card { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; margin-bottom: 1rem; }
        .habit-card.nn { border-left: 5px solid var(--nn); }
        .u-title { font-size: 10px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; color: #555; }
        
        .stat-circle { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #222; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0a0a;
        }

        .ui-btn { background: #1a1a1a; border: 1px solid #333; padding: 12px 16px; border-radius: 12px; font-size: 11px; font-weight: 900; color: #fff; text-transform: uppercase; }
        .ui-btn.has-data { border-color: var(--neon); color: var(--neon); background: rgba(34,197,94,0.1); }
        
        .check-box { width: 38px; height: 38px; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .check-box.active { background: var(--neon); border-color: var(--neon); color: #000; }
        
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; }
        .nav-link.active { color: var(--neon); }
        
        /* Modal & Picker */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; padding: 25px; }
        .opt-box { padding: 20px 10px; border: 1px solid #333; border-radius: 15px; text-align: center; font-weight: 900; background: #0a0a0a; color: #fff; }
        .opt-box.active { border-color: var(--neon) !important; color: var(--neon) !important; background: rgba(34,197,94,0.15) !important; border-width: 2px; }
        
        /* Builder Formatting */
        input, textarea { background: #0a0a0a; border: 1px solid #222; color: white; padding: 16px; border-radius: 14px; width: 100%; outline: none; font-size: 16px; }
        .day-btn { width: 100%; aspect-ratio: 1; background: #111; border: 1px solid #222; border-radius: 8px; font-size: 10px; font-weight: 900; color: #444; }
        .day-btn.active { background: #fff; color: #000; border-color: #fff; }
        
        .toggle-tab { flex: 1; padding: 12px; text-align: center; font-size: 10px; font-weight: 900; border-radius: 10px; color: #444; background: #111; }
        .toggle-tab.active { background: #333; color: #fff; }

        .cal-day { aspect-ratio: 0.85; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid #222; font-size: 12px; font-weight: 900; }
    </style>
</head>
<body>
    <header class="fixed-header">
        <div id="streak-counter" class="absolute left-6 top-6 text-orange-500 font-black italic text-sm">🔥 0</div>
        <div id="quote-area" class="text-[8px] text-zinc-600 font-bold uppercase tracking-[0.3em] mt-2 mb-2">DO SOMETHING TODAY THAT YOUR FUTURE SELF WILL THANK YOU FOR</div>
        
        <div class="cursor-pointer flex flex-col items-center mb-4" onclick="openCalendar()">
            <p id="display-day" class="u-title text-green-500 mb-0">---</p>
            <h2 id="display-date" class="text-4xl font-black italic uppercase tracking-tighter leading-none">---</h2>
        </div>

        <div class="flex gap-4">
            <div class="stat-circle" id="circle-day-score"><span class="stat-val text-sm font-black" id="score-ring">0%</span><span class="stat-lab">Today</span></div>
            <div class="stat-circle" style="border-color: var(--neon);"><span class="stat-val text-green-500 font-black" id="stat-conquered">0</span><span class="stat-lab">Conquer</span></div>
            <div class="stat-circle"><span class="stat-val text-sm font-black" id="stat-gone-by">0</span><span class="stat-lab">Days By</span></div>
        </div>
    </header>

    <main class="content-area">
        <section id="view-track"><div id="habit-feed" class="space-y-3"></div></section>
        
        <section id="view-build" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <div class="bg-zinc-900 p-1 rounded-xl flex gap-1"><input type="number" id="global-target" value="80" class="w-8 p-1 bg-transparent text-center text-xs font-black text-green-500"></div>
                <h2 class="text-xl font-black italic uppercase">Constructor</h2>
                <div class="bg-zinc-900 p-1 rounded-xl flex gap-1"><input type="number" id="campaign-goal" value="365" class="w-10 p-1 bg-transparent text-center text-xs font-black text-blue-500"></div>
            </div>

            <div class="space-y-5 bg-[#0a0a0a] p-6 rounded-[2rem] border border-zinc-900 mb-10">
                <input type="text" id="h-name" placeholder="HABIT NAME" class="font-black">
                
                <div class="flex bg-zinc-900 p-1 rounded-xl gap-1">
                    <div id="type-fixed" class="toggle-tab active" onclick="setHabitType('fixed')">FIXED</div>
                    <div id="type-flex" class="toggle-tab" onclick="setHabitType('flex')">FLEXIBLE</div>
                </div>

                <div id="section-fixed" class="grid grid-cols-7 gap-1">
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="1">M</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="2">T</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="3">W</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="4">T</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="5">F</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="6">S</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="0">S</button>
                </div>

                <div id="section-flex" class="hidden">
                    <p class="u-title mb-2">Times Per Week</p>
                    <input type="number" id="h-freq" value="3" min="1" max="7">
                </div>

                <div class="flex items-center justify-between p-4 bg-zinc-900/40 border border-zinc-800 rounded-2xl"><span class="u-title">Non-Negotiable</span><input type="checkbox" id="h-nn" class="w-6 h-6"></div>
                
                <div class="space-y-4 pt-4 border-t border-zinc-900">
                    <label class="u-title flex justify-between">Numeric Choice <input type="checkbox" id="use-num" class="w-5 h-5"></label>
                    <div class="grid grid-cols-3 gap-2"><input type="number" id="h-min" placeholder="MIN"><input type="number" id="h-max" placeholder="MAX"><input type="number" id="h-step" placeholder="STEP"></div>
                    <input type="text" id="h-unit" placeholder="UNIT (e.g. x, km, pages)">
                    
                    <label class="u-title flex justify-between">Options/Tags <input type="checkbox" id="use-opt" class="w-5 h-5"></label>
                    <textarea id="h-custom-tags" placeholder="Tag A, Tag B..." class="h-24"></textarea>
                    
                    <div class="flex gap-6"><label class="u-title flex items-center gap-2">Multi-Select <input type="checkbox" id="h-multi" class="w-4 h-4"></label><label class="u-title flex items-center gap-2">Notes <input type="checkbox" id="use-text" class="w-4 h-4"></label></div>
                </div>
                <button onclick="saveHabit()" class="w-full py-5 bg-white text-black font-black uppercase rounded-2xl tracking-widest text-xs mt-4">Forge Habit</button>
            </div>
            <div id="manifest-list" class="space-y-2 pb-20"></div>
        </section>
    </main>

    <div id="calendar-modal" class="modal">
        <div class="flex items-center mb-6"><button onclick="closeCalendar()" class="w-12 h-12 flex bg-zinc-900 border border-zinc-800 rounded-full items-center justify-center text-xl">✕</button><span class="u-title ml-4">Campaign Logs</span></div>
        <div class="flex items-center justify-between mb-8 px-2">
            <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-xl">‹</button>
            <h3 id="cal-month-title" class="text-white font-black uppercase tracking-[0.2em] text-sm text-center">---</h3>
            <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-xl">›</button>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-2 overflow-y-auto px-2 pb-10"></div>
    </div>

    <div id="picker-modal" class="modal">
        <div class="flex items-center justify-between mb-8">
            <button onclick="closeModal()" class="w-12 h-12 flex bg-zinc-900 rounded-full items-center justify-center text-xl">✕</button>
            <h3 id="modal-title" class="text-white font-black uppercase tracking-widest text-xs text-center flex-1 mx-4">---</h3>
            <button onclick="closeModal()" class="w-12 h-12 bg-green-500 text-black rounded-full font-bold">✓</button>
        </div>
        <div id="modal-content" class="grid grid-cols-2 gap-3 mb-6 overflow-y-auto"></div>
        <div id="modal-text-sec" class="hidden mt-auto"><textarea id="modal-text-input" onchange="syncModalText()" placeholder="Add session notes..." class="h-24"></textarea></div>
    </div>

    <nav class="fixed-nav">
        <div onclick="nav('track')" class="nav-link" id="n-track"><span class="u-title">Track</span></div>
        <div onclick="nav('build')" class="nav-link" id="n-build"><span class="u-title">Build</span></div>
    </nav>

    <script>
        let manifest = JSON.parse(localStorage.getItem('F40_MANIFEST')) || [];
        let logs = JSON.parse(localStorage.getItem('F40_LOGS')) || {};
        let activeDate = new Date().toISOString().split('T')[0];
        let calViewingDate = new Date(activeDate);
        let activePickerHabit = null;
        let activeHabitType = 'fixed';

        function init() {
            new Sortable(document.getElementById('manifest-list'), { handle: '.drag-handle', animation: 150, onEnd: () => {
                const newM = []; document.querySelectorAll('.manifest-item').forEach(el => { newM.push(manifest.find(h => h.id === el.dataset.id)); });
                manifest = newM; saveManifest();
            }});
            nav('track');
        }

        function setHabitType(type) {
            activeHabitType = type;
            document.getElementById('type-fixed').classList.toggle('active', type === 'fixed');
            document.getElementById('type-flex').classList.toggle('active', type === 'flex');
            document.getElementById('section-fixed').classList.toggle('hidden', type === 'flex');
            document.getElementById('section-flex').classList.toggle('hidden', type === 'fixed');
        }

        function nav(v) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.getElementById('n-'+v).classList.add('active');
            if(v==='track') renderTrack();
            if(v==='build') renderManifest();
        }

        function getWeekLogsCount(habitId, dateStr) {
            const d = new Date(dateStr);
            const day = d.getDay() || 7;
            const monday = new Date(d); monday.setDate(d.getDate() - day + 1);
            let count = 0;
            for(let i=0; i<7; i++) {
                const checkDate = new Date(monday); checkDate.setDate(monday.getDate() + i);
                const ds = checkDate.toISOString().split('T')[0];
                const l = logs[ds]?.[habitId];
                if(l && (l.c || l.n !== null || l.t.length > 0)) count++;
            }
            return count;
        }

        function getDayScore(dateStr, target) {
            const d = new Date(dateStr); 
            const dayIdx = d.getDay();
            const habits = manifest.filter(h => {
                if(h.type === 'fixed') return h.days.includes(dayIdx);
                const weekCount = getWeekLogsCount(h.id, dateStr);
                return weekCount < h.freq || (logs[dateStr]?.[h.id]); 
            });
            if(habits.length === 0) return { score: 0, success: false, total: 0 };
            let completed = 0, fnn = false;
            habits.forEach(h => {
                const l = logs[dateStr]?.[h.id] || { n: null, t: [], txt: '', c: false };
                const isDone = (h.useNum ? (l.n !== null) : true) && (h.useOpt ? (l.t.length > 0) : true) && ((!h.useNum && !h.useOpt) ? l.c : true);
                if(isDone) completed++; if(h.nn && !isDone) fnn = true;
            });
            const score = Math.round((completed/habits.length)*100);
            return { score: fnn ? 0 : score, success: !fnn && score >= target, total: habits.length };
        }

        function renderTrack() {
            const feed = document.getElementById('habit-feed'); feed.innerHTML = '';
            const target = parseInt(document.getElementById('global-target').value);
            const todayIdx = new Date(activeDate).getDay();
            
            const todayHabits = manifest.filter(h => {
                if(h.type === 'fixed') return h.days.includes(todayIdx);
                const count = getWeekLogsCount(h.id, activeDate);
                const loggedToday = logs[activeDate]?.[h.id];
                return count < h.freq || loggedToday;
            });

            todayHabits.forEach(h => {
                const log = logs[activeDate]?.[h.id] || { n: null, t: [], txt: '', c: false };
                const isDone = (h.useNum ? (log.n !== null) : true) && (h.useOpt ? (log.t.length > 0) : true) && ((!h.useNum && !h.useOpt) ? log.c : true);
                let btnLabel = "SET"; 
                if(log.n !== null) btnLabel = `${log.n}${h.unit}`; 
                else if(log.t.length > 0) btnLabel = log.t[0];

                feed.innerHTML += `
                <div class="habit-card ${h.nn?'nn':''} flex items-center justify-between">
                    <div>
                        <p class="font-black text-[15px] ${isDone?'text-white':'text-zinc-600'}">${h.name.toUpperCase()}</p>
                        ${h.type === 'flex' ? `<p class="u-title" style="font-size:7px">Progress: ${getWeekLogsCount(h.id, activeDate)}/${h.freq}</p>` : ''}
                    </div>
                    <div class="flex items-center gap-3">
                        ${(h.useNum || h.useOpt || h.useText) ? `<button onclick="openPicker('${h.id}')" class="ui-btn ${btnLabel!=='SET'?'has-data':''}">${btnLabel}</button>` : ''}
                        <div class="check-box ${isDone?'active':''}" onclick="toggleManual('${h.id}')">${isDone?'✓':''}</div>
                    </div>
                </div>`;
            });

            const res = getDayScore(activeDate, target);
            document.getElementById('score-ring').innerText = res.score + '%';
            document.getElementById('circle-day-score').style.borderColor = res.success ? 'var(--neon)' : (res.score > 0 ? 'var(--nn)' : 'var(--border)');
            
            // Dates
            document.getElementById('display-date').innerText = new Date(activeDate).toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
            document.getElementById('display-day').innerText = new Date(activeDate).toLocaleDateString('en-GB', {weekday:'long'});
            updateStats(target);
        }

        function updateStats(target) {
            const logDates = Object.keys(logs).sort();
            if(logDates.length === 0) return;
            let conquered = 0;
            logDates.forEach(d => { if(getDayScore(d, target).success) conquered++; });
            document.getElementById('stat-conquered').innerText = conquered;
            document.getElementById('stat-gone-by').innerText = Math.ceil(Math.abs(new Date() - new Date(logDates[0])) / 86400000) || 1;
        }

        function openPicker(id) {
            activePickerHabit = manifest.find(x => x.id === id); 
            const log = logs[activeDate]?.[id] || { n: null, t: [], txt: '' };
            document.getElementById('modal-title').innerText = activePickerHabit.name.toUpperCase();
            const content = document.getElementById('modal-content'); content.innerHTML = '';
            
            if(activePickerHabit.useNum) {
                for(let i=activePickerHabit.min; i<=activePickerHabit.max; i+=activePickerHabit.step) {
                    content.innerHTML += `<div class="opt-box ${log.n===i?'active':''}" onclick="selectNum(${i})">${i}${activePickerHabit.unit}</div>`;
                }
            }
            if(activePickerHabit.useOpt) {
                activePickerHabit.tags.forEach(t => {
                    content.innerHTML += `<div class="opt-box ${log.t.includes(t)?'active':''}" onclick="selectTag('${t}')">${t}</div>`;
                });
            }
            document.getElementById('modal-text-sec').classList.toggle('hidden', !activePickerHabit.useText);
            document.getElementById('modal-text-input').value = log.txt || '';
            document.getElementById('picker-modal').style.display = 'flex';
        }

        function selectNum(v) { ensureLog(); logs[activeDate][activePickerHabit.id].n = v; save(); openPicker(activePickerHabit.id); }
        function selectTag(t) { 
            ensureLog(); let l = logs[activeDate][activePickerHabit.id]; 
            l.t = activePickerHabit.multi ? (l.t.includes(t)?l.t.filter(x=>x!==t):[...l.t,t]) : [t]; 
            save(); openPicker(activePickerHabit.id); 
        }

        function saveHabit() {
            const h = { 
                id: 'h' + Date.now(), 
                name: document.getElementById('h-name').value, 
                type: activeHabitType,
                days: Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.day)),
                freq: parseInt(document.getElementById('h-freq').value),
                nn: document.getElementById('h-nn').checked, 
                useNum: document.getElementById('use-num').checked, 
                useOpt: document.getElementById('use-opt').checked, 
                useText: document.getElementById('use-text').checked, 
                min: parseFloat(document.getElementById('h-min').value || 0), 
                max: parseFloat(document.getElementById('h-max').value || 0), 
                step: parseFloat(document.getElementById('h-step').value || 1), 
                unit: document.getElementById('h-unit').value || '', 
                tags: document.getElementById('h-custom-tags').value.split(',').map(t => t.trim()).filter(t => t), 
                multi: document.getElementById('h-multi').checked 
            };
            if(h.name) { manifest.push(h); saveManifest(); nav('track'); }
        }

        function openCalendar() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const target = parseInt(document.getElementById('global-target').value);
            const todayStr = new Date().toISOString().split('T')[0];
            const logDates = Object.keys(logs).sort();
            const firstLogDate = logDates.length > 0 ? logDates[0] : todayStr;

            document.getElementById('cal-month-title').innerText = calViewingDate.toLocaleDateString('en-GB', {month:'long', year:'numeric'});
            const month = calViewingDate.getMonth(), year = calViewingDate.getFullYear();
            const offset = (new Date(year, month, 1).getDay() + 6) % 7;
            for(let i=0; i<offset; i++) grid.innerHTML += `<div class="opacity-0"></div>`;
            for(let d=1; d<=new Date(year, month + 1, 0).getDate(); d++) {
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const res = getDayScore(ds, target);
                let bg = 'transparent', bdr = '#222';
                if(res.total > 0 && ds >= firstLogDate && ds <= todayStr) {
                    bg = res.success ? 'rgba(34,197,94,0.25)' : 'rgba(239,68,68,0.25)';
                    bdr = res.success ? 'var(--neon)' : 'var(--nn)';
                }
                grid.innerHTML += `<div class="cal-day" style="background:${bg}; border-color:${bdr}" onclick="selectDate('${ds}')">${d}<span class="text-[7px]">${res.total > 0 && ds <= todayStr ? res.score+'%' : ''}</span></div>`;
            }
            document.getElementById('calendar-modal').style.display = 'flex';
        }

        function toggleManual(id) { activePickerHabit = manifest.find(x => x.id === id); ensureLog(); logs[activeDate][id].c = !logs[activeDate][id].c; save(); }
        function selectDate(ds) { activeDate = ds; closeCalendar(); renderTrack(); }
        function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }
        function closeModal() { document.getElementById('picker-modal').style.display = 'none'; }
        function ensureLog() { if(!logs[activeDate]) logs[activeDate] = {}; if(!logs[activeDate][activePickerHabit.id]) logs[activeDate][activePickerHabit.id] = { n:null, t:[], txt:'', c:false }; }
        function save() { localStorage.setItem('F40_LOGS', JSON.stringify(logs)); renderTrack(); }
        function saveManifest() { localStorage.setItem('F40_MANIFEST', JSON.stringify(manifest)); }
        function renderManifest() { document.getElementById('manifest-list').innerHTML = manifest.map(h => `<div class="manifest-item flex items-center bg-zinc-900/50 p-3 rounded-xl mb-2" data-id="${h.id}"><span class="flex-1 font-black text-[10px]">${h.name.toUpperCase()}</span><button onclick="deleteH('${h.id}')" class="px-3">✕</button></div>`).join(''); }
        function deleteH(id) { if(confirm('Delete?')) { manifest = manifest.filter(x=>x.id!==id); saveManifest(); renderManifest(); } }
        function changeMonth(dir) { calViewingDate.setMonth(calViewingDate.getMonth() + dir); openCalendar(); }
        init();
    </script>
</body>
</html>
