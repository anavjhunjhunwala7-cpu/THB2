<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE HABIT BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #22c55e; --bg: #000000; --panel: #111111; --border: #222222; --nn: #ef4444; --reset: #f97316; --quote: #f97316; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .hidden { display: none !important; }
        .fixed-header { position: fixed; top: 0; width: 100%; height: 210px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; padding: 10px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .content-area { margin-top: 220px; margin-bottom: 120px; padding: 15px; }
        .stat-circle { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; transition: all 0.3s ease; position: relative; }
        .stat-val { font-size: 13px; font-weight: 900; transition: color 0.3s ease; }
        .stat-lab { font-size: 7px; font-weight: 900; color: #444; text-transform: uppercase; margin-top: 1px; }
        
        @keyframes pulse-green { 0% { box-shadow: 0 0 0px transparent; border-color: #222; } 50% { box-shadow: 0 0 20px var(--neon); border-color: var(--neon); } 100% { box-shadow: 0 0 0px transparent; border-color: #222; } }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0px transparent; border-color: #222; } 50% { box-shadow: 0 0 20px var(--reset); border-color: var(--reset); } 100% { box-shadow: 0 0 0px transparent; border-color: #222; } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px transparent; border-color: #222; } 50% { box-shadow: 0 0 20px var(--nn); border-color: var(--nn); } 100% { box-shadow: 0 0 0px transparent; border-color: #222; } }
        
        .glow-win { animation: pulse-green 1.2s ease-out; }
        .glow-warn { animation: pulse-orange 1.2s ease-out; }
        .glow-fail { animation: pulse-red 1.2s ease-out; }

        .habit-card { background: var(--panel); border: 1px solid var(--border); border-radius: 1.25rem; margin-bottom: 10px; display: flex; align-items: center; padding: 16px; position: relative; min-height: 85px; justify-content: space-between; }
        .nn-active { border-left: 4px solid var(--nn); }
        .nn-badge { position: absolute; left: 0; top: 0; background: var(--nn); color: white; font-size: 7px; font-weight: 900; padding: 2px 5px; border-bottom-right-radius: 6px; }
        .action-zone { display: flex; align-items: center; gap: 8px; }
        .pill-scroll { display: flex; overflow-x: auto; gap: 4px; scrollbar-width: none; max-width: 140px; align-items: center; }
        .pill { background: rgba(34,197,94,0.1); border: 1px solid var(--neon); color: var(--neon); padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; white-space: nowrap; }
        .note-preview-pill { background: rgba(249,115,22,0.1); border: 1px solid var(--reset); color: var(--reset); padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; white-space: nowrap; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
        .set-btn { font-size: 10px; font-weight: 900; color: var(--neon); padding: 8px 14px; border: 1px dashed var(--neon); border-radius: 8px; }
        .check-box { width: 44px; height: 44px; border: 2px solid #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .check-box.active { background: var(--neon); border-color: var(--neon); color: #000; }
        .input-dark { background: #0a0a0a; border: 1px solid #222; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .day-btn { width: 100%; aspect-ratio: 1; background: #111; border: 1px solid #222; border-radius: 8px; font-size: 10px; font-weight: 900; color: #444; }
        .day-btn.active { background: var(--neon); color: #000; border-color: var(--neon); }
        .u-title { font-size: 9px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-header-cell { text-align: center; font-size: 10px; font-weight: 900; color: var(--neon); padding-bottom: 10px; }
        .cal-day-cell { aspect-ratio: 1/1; border: 2px solid #222; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 8px; position: relative; font-weight: 900; font-size: 15px; background: #0a0a0a; color: #666; }
        .cal-perc { position: absolute; bottom: 8px; font-size: 9px; font-weight: 900; letter-spacing: -0.05em; }
        .cal-win { border-color: var(--neon) !important; background: rgba(34,197,94,0.3) !important; color: #fff !important; }
        .cal-loss { border-color: var(--nn) !important; background: rgba(239,68,68,0.3) !important; color: #fff !important; }
        .fixed-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); display: flex; height: 80px; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .nav-item.active { color: var(--neon); }
        .btn-main { width: 100%; padding: 18px; border-radius: 16px; font-weight: 900; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; transition: all 0.2s; }
        .btn-neon { background: var(--neon); color: #000; }
        .nav-arrow { font-size: 20px; font-weight: 900; color: #333; padding: 5px; }
        .nav-arrow.active { color: var(--neon); }
        .quote-banner { font-size: 10px; font-weight: 900; letter-spacing: 0.15em; color: var(--quote); text-transform: uppercase; text-align: center; margin-bottom: 2px; }
        .drag-handle { cursor: grab; padding-right: 12px; color: #333; font-size: 18px; }
        
        /* Insights period styling */
        .period-pill-row { display: flex; overflow-x: auto; gap: 6px; padding-bottom: 12px; scrollbar-width: none; }
        .p-pill { background: #111; border: 1px solid #222; color: #555; padding: 8px 14px; border-radius: 10px; font-size: 10px; font-weight: 900; white-space: nowrap; }
        .p-pill.active { background: var(--neon); color: #000; border-color: var(--neon); }
        .period-box { background: #111; border: 1px solid #222; border-radius: 16px; display: flex; align-items: center; padding: 6px 12px; gap: 10px; }
        .tag-tally { font-size: 11px; font-weight: 900; padding: 6px 12px; background: #000; border: 1px solid #333; border-radius: 8px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="view-track">
        <header class="fixed-header">
            <div id="daily-quote" class="quote-banner">---</div>
            <div class="flex items-center gap-4">
                <button onclick="changeDay(-1)" class="nav-arrow active">◂</button>
                <div class="cursor-pointer flex flex-col items-center" onclick="openCalendar()">
                    <p id="head-day" class="u-title text-green-500 mb-0">---</p>
                    <h2 id="head-date" class="text-3xl font-black italic uppercase tracking-tighter">---</h2>
                </div>
                <button id="next-day-btn" onclick="changeDay(1)" class="nav-arrow">▸</button>
            </div>
            <div class="flex gap-3">
                <div id="score-circle" class="stat-circle"><span id="val-score" class="stat-val">0%</span><span class="stat-lab">Score</span></div>
                <div id="conquer-circle" class="stat-circle"><span class="stat-val" id="val-conquer">0/75</span><span class="stat-lab">Conquer</span></div>
                <div id="days-circle" class="stat-circle"><span class="stat-val" id="val-gone">0</span><span class="stat-lab">Days By</span></div>
            </div>
        </header>
        <main class="content-area">
            <div id="habit-feed"></div>
            <button id="update-btn" onclick="updateAndLock()" class="btn-main btn-neon mt-6 mb-12">UPDATE & LOCK DAY</button>
        </main>
    </div>

    <div id="view-build" class="hidden">
        <div class="p-6 pb-32">
            <div class="mb-8 p-4 bg-zinc-900 rounded-2xl border border-zinc-800">
                <h2 class="u-title text-white mb-4 text-center">Campaign Command</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-zinc-500 uppercase">Goal Days</label>
                        <input type="number" id="c-goal" class="input-dark p-2 text-sm" placeholder="75" onchange="saveConfig()">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-zinc-500 uppercase">Pass Goal %</label>
                        <input type="number" id="c-pass" class="input-dark p-2 text-sm" placeholder="100" onchange="saveConfig()">
                    </div>
                </div>
            </div>
            <h2 class="text-xl font-black uppercase italic mb-6 text-center">Constructor</h2>
            <div class="space-y-4" id="form-wrap">
                <input type="text" id="h-name" placeholder="HABIT NAME" class="input-dark font-black">
                <div class="flex bg-zinc-900 p-1 rounded-xl">
                    <button id="mode-fixed" class="flex-1 py-3 text-[9px] font-black rounded-lg bg-zinc-800" onclick="setMode('fixed')">FIXED</button>
                    <button id="mode-flex" class="flex-1 py-3 text-[9px] font-black text-zinc-500 rounded-lg" onclick="setMode('flex')">FLEXIBLE</button>
                </div>
                <div id="days-row" class="grid grid-cols-7 gap-1">
                    <button class="day-btn active" data-d="1" onclick="toggleDay(this)">M</button>
                    <button class="day-btn active" data-d="2" onclick="toggleDay(this)">T</button>
                    <button class="day-btn active" data-d="3" onclick="toggleDay(this)">W</button>
                    <button class="day-btn active" data-d="4" onclick="toggleDay(this)">T</button>
                    <button class="day-btn active" data-d="5" onclick="toggleDay(this)">F</button>
                    <button class="day-btn active" data-d="6" onclick="toggleDay(this)">S</button>
                    <button class="day-btn active" data-d="0" onclick="toggleDay(this)">S</button>
                </div>
                <div id="flex-row" class="hidden"><input type="number" id="h-freq" placeholder="Times/Week" class="input-dark"></div>
                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-xl"><span class="u-title text-white">Non-Negotiable</span><input type="checkbox" id="h-nn" class="w-5 h-5 accent-green-500"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="p-3 bg-zinc-900 rounded-xl space-y-2">
                        <div class="flex justify-between items-center"><span class="u-title text-white">Numeric</span><input type="checkbox" id="h-useNum" class="w-5 h-5 accent-green-500"></div>
                        <div class="grid grid-cols-2 gap-1">
                            <input type="number" id="h-min" placeholder="Min" class="input-dark text-[10px] p-2"><input type="number" id="h-max" placeholder="Max" class="input-dark text-[10px] p-2"><input type="number" id="h-step" placeholder="Step" class="input-dark text-[10px] p-2"><input type="text" id="h-unit" placeholder="Unit" class="input-dark text-[10px] p-2">
                        </div>
                    </div>
                    <div class="p-3 bg-zinc-900 rounded-xl space-y-2">
                        <div class="flex justify-between items-center"><span class="u-title text-white">Tags</span><input type="checkbox" id="h-useOpt" class="w-5 h-5 accent-green-500"></div>
                        <textarea id="h-tags" placeholder="Tag 1, Tag 2..." class="input-dark text-xs h-20"></textarea>
                    </div>
                </div>
                <div class="flex gap-4 p-4 bg-zinc-900 rounded-xl">
                    <label class="flex items-center gap-2 u-title text-white">Multi <input type="checkbox" id="h-multi" class="w-5 h-5 accent-green-500"></label>
                    <label class="flex items-center gap-2 u-title text-white">Notes <input type="checkbox" id="h-notes" class="w-5 h-5 accent-green-500"></label>
                </div>
                <button onclick="saveHabit()" id="forge-btn" class="w-full py-5 bg-white text-black font-black rounded-2xl uppercase text-[10px]">Forge Habit</button>
                <button onclick="resetBuilder()" id="cancel-btn" class="hidden w-full py-2 text-zinc-600 font-bold text-[9px]">CANCEL EDIT</button>
            </div>
            <div id="manifest-list" class="mt-8 space-y-2"></div>
        </div>
    </div>

    <div id="view-insights" class="hidden">
        <div class="p-6 pb-32">
            <h2 class="text-xl font-black uppercase italic mb-6 text-center">Intelligence</h2>
            <div class="period-pill-row" id="pill-row">
                <button class="p-pill active" onclick="setInsightRange('MAX')">MAX</button>
                <button class="p-pill" onclick="setInsightRange(7)">1W</button>
                <button class="p-pill" onclick="setInsightRange(14)">2W</button>
                <button class="p-pill" onclick="setInsightRange(21)">3W</button>
                <button class="p-pill" onclick="setInsightRange(28)">4W</button>
                <button class="p-pill" onclick="setInsightRange(60)">2M</button>
                <button class="p-pill" onclick="setInsightRange(90)">3M</button>
                <button class="p-pill" onclick="setInsightRange(180)">6M</button>
            </div>
            <div class="period-box mb-8">
                <span class="u-title">Custom:</span>
                <input type="number" id="custom-days" class="bg-transparent text-white font-black text-sm w-full outline-none" placeholder="Enter days...">
                <button onclick="setInsightRange('CUSTOM')" class="text-green-500 font-black text-lg">✓</button>
            </div>
            <div id="insights-list" class="space-y-4"></div>

            <div class="mt-12 p-6 bg-zinc-900 rounded-2xl border border-zinc-800 border-dashed">
                <h2 class="u-title text-zinc-500 mb-4 text-center">Data Command Vault</h2>
                <textarea id="backup-box" class="input-dark text-[8px] h-20 mb-3" placeholder="Paste backup string here..."></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="copyBackup()" class="py-3 bg-zinc-800 text-white font-black text-[9px] rounded-xl uppercase">Copy Backup</button>
                    <button onclick="restoreBackup()" class="py-3 bg-red-900/30 text-red-500 font-black text-[9px] border border-red-500/50 rounded-xl uppercase">Restore Data</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mod-pick" class="modal">
        <div class="flex justify-between items-center mb-6"><button onclick="clearEntry()" class="text-orange-500 text-3xl font-black">↻</button><h3 id="pick-title" class="u-title text-white">LOG</h3><button onclick="closePickerFinal()" class="text-green-500 text-3xl font-black">✓</button></div>
        <div id="pick-options" class="grid grid-cols-2 gap-3 mb-6"></div>
        <div id="notes-container" class="hidden space-y-2"><span class="u-title">Notes</span><textarea id="pick-notes" class="input-dark h-32" placeholder="Type notes here..."></textarea></div>
    </div>
    <div id="mod-cal" class="modal">
        <div class="flex justify-between items-center mb-6"><button onclick="closeM('mod-cal')" class="text-2xl">✕</button><div class="text-center"><p id="cal-head-day" class="u-title text-green-500 mb-0">---</p><h2 id="cal-head-date" class="text-xl font-black uppercase italic tracking-tighter">---</h2></div><div class="w-8"></div></div>
        <div class="cal-grid mb-2"><div class="cal-header-cell">M</div><div class="cal-header-cell">T</div><div class="cal-header-cell">W</div><div class="cal-header-cell">T</div><div class="cal-header-cell">F</div><div class="cal-header-cell">S</div><div class="cal-header-cell">S</div></div>
        <div id="cal-grid" class="cal-grid"></div>
    </div>

    <nav class="fixed-nav">
        <div class="nav-item active" id="n-track" onclick="nav('track')">Track</div>
        <div class="nav-item" id="n-build" onclick="nav('build')">Build</div>
        <div class="nav-item" id="n-insights" onclick="nav('insights')">Insights</div>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script>
        let manifest = JSON.parse(localStorage.getItem('M_BREAD_V10')) || [];
        let logs = JSON.parse(localStorage.getItem('L_BREAD_V10')) || {};
        let config = JSON.parse(localStorage.getItem('C_BREAD_V10')) || { goal: 75, pass: 100 };
        let activeDate = new Date().toISOString().split('T')[0];
        let todayStr = new Date().toISOString().split('T')[0];
        let buildMode = 'fixed', editId = null, curHId = null, insightDays = 0;

        function setQuote() { const qs = ["DISCIPLINE OR REGRET", "WIN THE DAY", "KILL THE EXCUSE", "OWN YOUR LIFE", "DO THE WORK", "STAY HARD"]; document.getElementById('daily-quote').innerText = qs[Math.floor(Math.random() * qs.length)]; }

        // --- INTELLIGENCE ENGINE ---
        function setInsightRange(val) {
            const pills = document.querySelectorAll('.p-pill');
            pills.forEach(p => p.classList.remove('active'));
            
            if (val === 'MAX') {
                insightDays = 0;
                pills[0].classList.add('active');
                document.getElementById('custom-days').value = '';
            } else if (val === 'CUSTOM') {
                insightDays = parseInt(document.getElementById('custom-days').value) || 0;
            } else {
                insightDays = val;
                // Highlight the correct pill
                const labels = ['MAX',7,14,21,28,60,90,180];
                const idx = labels.indexOf(val);
                if(idx !== -1) pills[idx].classList.add('active');
                document.getElementById('custom-days').value = val;
            }
            renderInsights();
        }

        function renderInsights() {
            const list = document.getElementById('insights-list'); list.innerHTML = '';
            const now = new Date();
            manifest.forEach(h => {
                let hits = 0, scheduled = 0, sumNum = 0, countNum = 0, tagCounts = {};
                Object.keys(logs).forEach(ds => {
                    const lDate = new Date(ds);
                    const diff = Math.ceil((now - lDate) / 86400000);
                    if (insightDays !== 0 && diff > insightDays) return;
                    const l = logs[ds][h.id];
                    if (h.type === 'fixed') { if (h.days.includes(lDate.getDay())) { scheduled++; if (l?.done) hits++; } } 
                    else { if (l?.done) hits++; }
                    if (l?.done && l.n !== null) { sumNum += l.n; countNum++; }
                    if (l?.done && l.t) l.t.forEach(tag => tagCounts[tag] = (tagCounts[tag] || 0) + 1);
                });

                let rate = 0, targetStr = '';
                if (h.type === 'fixed') { rate = scheduled ? Math.round((hits/scheduled)*100) : 0; targetStr = `${h.days.length}/7`; } 
                else {
                    const wks = insightDays === 0 ? Math.max(1, Math.ceil(Object.keys(logs).length / 7)) : Math.ceil(insightDays / 7);
                    rate = Math.min(100, Math.round((hits / (h.freq * wks)) * 100)); targetStr = `${h.freq}/7`;
                }

                // Smart Decimal Logic
                let avgDisp = 0;
                if(countNum) {
                    const rawAvg = sumNum / countNum;
                    const isDecimalStep = (h.step % 1 !== 0);
                    avgDisp = isDecimalStep ? rawAvg.toFixed(1) : Math.round(rawAvg);
                }

                let cardHTML = `<div class="p-5 bg-zinc-900 border border-zinc-800 rounded-3xl">
                    <div class="flex justify-between items-center mb-4">
                        <span class="u-title text-white font-black">${h.name} <span class="text-zinc-600 ml-1">(${targetStr})</span></span>
                        <span class="text-green-500 font-black text-xs">${rate}%</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">`;
                if (h.useNum) cardHTML += `<div class="bg-black p-4 rounded-2xl text-center col-span-2"><p class="u-title text-[7px] mb-1">Average</p><p class="text-xl font-black">${avgDisp}${h.unit}</p></div>`;
                else cardHTML += `<div class="bg-black p-4 rounded-2xl text-center col-span-2"><p class="u-title text-[7px] mb-1">Total Hits</p><p class="text-xl font-black">${hits}</p></div>`;
                cardHTML += `</div>`;
                if (Object.keys(tagCounts).length > 0) {
                    cardHTML += `<div class="flex flex-wrap gap-2 mt-4">`;
                    for (const [tag, count] of Object.entries(tagCounts)) cardHTML += `<div class="tag-tally">${tag}: <span class="text-green-500">${count}</span></div>`;
                    cardHTML += `</div>`;
                }
                cardHTML += `</div>`;
                list.innerHTML += cardHTML;
            });
        }

        // --- CORE V10 LOGIC (UNCHANGED) ---
        function getDailyStatus(ds) {
            const di = new Date(ds).getDay();
            const habits = manifest.filter(h => h.type==='fixed' ? h.days.includes(di) : true);
            if(!habits.length) return { score: 100, pass: true };
            let done = 0, nnDone = true;
            habits.forEach(h => { const l = logs[ds]?.[h.id]; if(l?.done) done++; if(h.nn && !l?.done) nnDone = false; });
            const score = Math.round((done / habits.length) * 100);
            return { score, pass: (nnDone && score >= config.pass) };
        }
        function triggerSelectiveGlow(oldPass) {
            const s = getDailyStatus(activeDate);
            const scoreCirc = document.getElementById('score-circle');
            const conqCirc = document.getElementById('conquer-circle');
            scoreCirc.classList.remove('glow-win', 'glow-warn', 'glow-fail');
            void scoreCirc.offsetWidth;
            if(s.score >= config.pass) scoreCirc.classList.add('glow-win');
            else if(s.score >= (config.pass * 0.7)) scoreCirc.classList.add('glow-warn');
            else scoreCirc.classList.add('glow-fail');
            if (!oldPass && s.pass) { conqCirc.classList.remove('glow-win'); void conqCirc.offsetWidth; conqCirc.classList.add('glow-win'); }
        }
        function nav(v) {
            ['view-track', 'view-build', 'view-insights'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
            ['n-track', 'n-build', 'n-insights'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById('n-' + v).classList.add('active');
            if(v==='build') renderManifest(); else if(v==='insights') renderInsights(); else renderTrack();
        }
        function renderTrack() {
            const feed = document.getElementById('habit-feed'); feed.innerHTML = '';
            const habits = manifest.filter(h => h.type==='fixed' ? h.days.includes(new Date(activeDate).getDay()) : true);
            habits.forEach(h => {
                const l = logs[activeDate]?.[h.id] || { done: false, n: null, t: [], notes: '' };
                let ps = ''; if(l.n !== null) ps += `<div class="pill">${l.n}${h.unit}</div>`; if(l.t) l.t.forEach(t => ps += `<div class="pill">${t}</div>`); if(l.notes) ps += `<div class="note-preview-pill">📝</div>`;
                feed.innerHTML += `<div class="habit-card ${h.nn ? 'nn-active' : ''}">${h.nn ? '<div class="nn-badge">NN</div>' : ''}<div class="flex-1 mr-4 overflow-hidden" onclick="openPicker('${h.id}')"><p class="font-bold text-sm uppercase truncate">${h.name}</p></div><div class="action-zone">${ps ? `<div class="pill-scroll" onclick="openPicker('${h.id}')">${ps}</div>` : ((h.useNum || h.useOpt || h.notes) ? `<div class="set-btn" onclick="openPicker('${h.id}')">SET</div>` : '')}<div class="check-box ${l.done ? 'active' : ''}" onclick="toggleCheck('${h.id}')">${l.done?'✓':''}</div></div></div>`;
            });
            syncHeader();
        }
        function syncHeader() {
            const d = new Date(activeDate); document.getElementById('head-date').innerText = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }); document.getElementById('head-day').innerText = d.toLocaleDateString('en-GB', { weekday: 'long' });
            const s = getDailyStatus(activeDate); const sv = document.getElementById('val-score'); sv.innerText = s.score + '%';
            sv.style.color = s.score >= config.pass ? 'var(--neon)' : (s.score >= config.pass * 0.7 ? 'var(--reset)' : 'var(--nn)');
            let conq = 0; Object.keys(logs).forEach(date => { if(getDailyStatus(date).pass) conq++; }); document.getElementById('val-conquer').innerText = `${conq}/${config.goal}`;
            const ad = Object.keys(logs).sort(); document.getElementById('val-gone').innerText = ad.length ? Math.ceil(Math.abs(new Date() - new Date(ad[0]))/86400000) : 0;
            document.getElementById('c-goal').value = config.goal; document.getElementById('c-pass').value = config.pass;
        }
        function toggleCheck(id) { const old = getDailyStatus(activeDate).pass; if(!logs[activeDate]) logs[activeDate] = {}; if(!logs[activeDate][id]) logs[activeDate][id] = { done: false, n: null, t: [], notes: '' }; logs[activeDate][id].done = !logs[activeDate][id].done; renderTrack(); triggerSelectiveGlow(old); }
        function saveConfig() { config.goal = parseInt(document.getElementById('c-goal').value) || 75; config.pass = parseInt(document.getElementById('c-pass').value) || 100; localStorage.setItem('C_BREAD_V10', JSON.stringify(config)); renderTrack(); }
        function setMode(m) { buildMode = m; document.getElementById('mode-fixed').classList.toggle('bg-zinc-800', m==='fixed'); document.getElementById('mode-flex').classList.toggle('bg-zinc-800', m==='flex'); document.getElementById('days-row').classList.toggle('hidden', m==='flex'); document.getElementById('flex-row').classList.toggle('hidden', m==='fixed'); }
        function toggleDay(btn) { btn.classList.toggle('active'); }
        function changeDay(offset) { let d = new Date(activeDate); d.setDate(d.getDate() + offset); let t = d.toISOString().split('T')[0]; if (t > todayStr) return; activeDate = t; setQuote(); renderTrack(); }
        function openPicker(id) { curHId = id; const h = manifest.find(x => x.id === id); if(!logs[activeDate]) logs[activeDate] = {}; if(!logs[activeDate][id]) logs[activeDate][id] = { done: false, n: null, t: [], notes: '' }; const l = logs[activeDate][id]; document.getElementById('pick-title').innerText = h.name; renderPickerOptions(); if(h.notes) { document.getElementById('notes-container').classList.remove('hidden'); document.getElementById('pick-notes').value = l.notes || ''; document.getElementById('pick-notes').oninput = (e) => { logs[activeDate][curHId].notes = e.target.value; }; } else { document.getElementById('notes-container').classList.add('hidden'); } document.getElementById('mod-pick').style.display = 'flex'; }
        function renderPickerOptions() { const h = manifest.find(x => x.id === curHId); const l = logs[activeDate][curHId]; const c = document.getElementById('pick-options'); c.innerHTML = ''; if(h.useNum) for(let i=h.min; i<=h.max; i+=h.step) c.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl border ${l.n == i ? 'border-green-500 text-green-500' : 'border-zinc-800'} text-center font-bold" onclick="setN(${i})">${i}</div>`; if(h.useOpt) h.tags.forEach(t => c.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl border ${l.t.includes(t) ? 'border-green-500 text-green-500' : 'border-zinc-800'} text-center font-bold" onclick="setT('${t}')">${t}</div>`); }
        function setN(v) { const old = getDailyStatus(activeDate).pass; logs[activeDate][curHId].n = v; logs[activeDate][curHId].done = true; triggerSelectiveGlow(old); renderPickerOptions(); }
        function setT(t) { const old = getDailyStatus(activeDate).pass; const h = manifest.find(x => x.id === curHId); let tags = logs[activeDate][curHId].t || []; logs[activeDate][curHId].t = h.multi ? (tags.includes(t) ? tags.filter(x => x !== t) : [...tags, t]) : [t]; logs[activeDate][curHId].done = true; triggerSelectiveGlow(old); renderPickerOptions(); }
        function closePickerFinal() { document.getElementById('mod-pick').style.display = 'none'; renderTrack(); }
        function clearEntry() { logs[activeDate][curHId] = { done: false, n: null, t: [], notes: '' }; openPicker(curHId); }
        function closeM(m) { document.getElementById(m).style.display = 'none'; renderTrack(); }
        function openCalendar() { const g = document.getElementById('cal-grid'); g.innerHTML = ''; const now = new Date(activeDate); document.getElementById('cal-head-day').innerText = now.toLocaleDateString('en-GB', { weekday: 'long' }); document.getElementById('cal-head-date').innerText = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }); const start = new Date(now.getFullYear(), now.getMonth(), 1).getDay(); const off = start === 0 ? 6 : start - 1; const last = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate(); for(let i=0; i<off; i++) g.innerHTML += `<div></div>`; for(let d=1; d<=last; d++) { const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const r = getDailyStatus(ds); g.innerHTML += `<div class="cal-day-cell ${logs[ds] ? (r.pass ? 'cal-win' : 'cal-loss') : ''} ${ds === todayStr ? 'ring-2 ring-white' : ''}" onclick="activeDate='${ds}'; closeM('mod-cal');">${d}${logs[ds] ? `<span class="cal-perc">${r.score}%</span>` : ''}</div>`; } document.getElementById('mod-cal').style.display = 'flex'; }
        function updateAndLock() { localStorage.setItem('L_BREAD_V10', JSON.stringify(logs)); renderTrack(); }
        function resetBuilder() { editId = null; document.getElementById('h-name').value = ''; document.getElementById('h-freq').value = ''; document.getElementById('h-nn').checked = false; document.getElementById('h-useNum').checked = false; document.getElementById('h-min').value = ''; document.getElementById('h-max').value = ''; document.getElementById('h-step').value = ''; document.getElementById('h-unit').value = ''; document.getElementById('h-useOpt').checked = false; document.getElementById('h-tags').value = ''; document.getElementById('h-multi').checked = false; document.getElementById('h-notes').checked = false; document.querySelectorAll('.day-btn').forEach(btn => btn.classList.add('active')); document.getElementById('forge-btn').innerText="Forge Habit"; document.getElementById('cancel-btn').classList.add('hidden'); }
        function saveHabit() { const h = { id: editId || 'h' + Date.now(), name: document.getElementById('h-name').value, type: buildMode, days: Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.d)), freq: parseInt(document.getElementById('h-freq').value || 0), nn: document.getElementById('h-nn').checked, useNum: document.getElementById('h-useNum').checked, min: parseFloat(document.getElementById('h-min').value || 0), max: parseFloat(document.getElementById('h-max').value || 0), step: parseFloat(document.getElementById('h-step').value || 1), unit: document.getElementById('h-unit').value, useOpt: document.getElementById('h-useOpt').checked, tags: document.getElementById('h-tags').value.split(',').map(t => t.trim()).filter(t => t), multi: document.getElementById('h-multi').checked, notes: document.getElementById('h-notes').checked }; if(!h.name) return; editId ? manifest[manifest.findIndex(x => x.id === editId)] = h : manifest.push(h); localStorage.setItem('M_BREAD_V10', JSON.stringify(manifest)); resetBuilder(); renderManifest(); }
        function renderManifest() { const list = document.getElementById('manifest-list'); list.innerHTML = ''; manifest.forEach((h) => { list.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl flex justify-between border border-zinc-800 items-center" data-id="${h.id}"><div class="flex items-center"><span class="drag-handle">☰</span><span class="font-black uppercase text-[10px]">${h.name}</span></div><div class="flex gap-4"><button onclick="loadEdit('${h.id}')" class="text-zinc-500 font-black text-[9px]">EDIT</button><button onclick="delH('${h.id}')" class="text-red-500 font-black text-[10px]">✕</button></div></div>`; }); new Sortable(list, { handle: '.drag-handle', animation: 150, onEnd: () => { const ids = Array.from(list.children).map(el => el.dataset.id); manifest.sort((a,b) => ids.indexOf(a.id) - ids.indexOf(b.id)); localStorage.setItem('M_BREAD_V10', JSON.stringify(manifest)); }}); }
        function loadEdit(id) { editId = id; const h = manifest.find(x => x.id === id); document.getElementById('h-name').value = h.name; setMode(h.type); document.getElementById('h-freq').value = h.freq; document.getElementById('h-nn').checked = h.nn; document.getElementById('h-useNum').checked = h.useNum; document.getElementById('h-min').value = h.min; document.getElementById('h-max').value = h.max; document.getElementById('h-step').value = h.step; document.getElementById('h-unit').value = h.unit; document.getElementById('h-useOpt').checked = h.useOpt; document.getElementById('h-tags').value = h.tags.join(', '); document.getElementById('h-multi').checked = h.multi; document.getElementById('h-notes').checked = h.notes; document.getElementById('forge-btn').innerText = "UPDATE"; document.getElementById('cancel-btn').classList.remove('hidden'); nav('build'); }
        function delH(id) { if(confirm('Delete?')) { manifest = manifest.filter(x => x.id !== id); localStorage.setItem('M_BREAD_V10', JSON.stringify(manifest)); renderManifest(); } }
        function copyBackup() { const s = btoa(JSON.stringify({ m: manifest, l: logs, c: config })); document.getElementById('backup-box').value = s; navigator.clipboard.writeText(s); alert("COPIED"); }
        function restoreBackup() { const s = document.getElementById('backup-box').value; if(!s || !confirm("OVERWRITE?")) return; try { const d = JSON.parse(atob(s)); manifest = d.m; logs = d.l; config = d.c; localStorage.setItem('M_BREAD_V10', JSON.stringify(manifest)); localStorage.setItem('L_BREAD_V10', JSON.stringify(logs)); localStorage.setItem('C_BREAD_V10', JSON.stringify(config)); window.location.reload(); } catch(e) { alert("FAIL"); } }

        setQuote(); renderTrack();
    </script>
</body>
