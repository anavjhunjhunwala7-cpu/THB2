<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE HABIT BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #22c55e; --bg: #000000; --panel: #111111; --border: #222222; --nn: #ef4444; --reset: #f97316; --quote: #f97316; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Header & Dashboard */
        .fixed-header { position: fixed; top: 0; width: 100%; height: 210px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; padding: 10px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .content-area { margin-top: 220px; margin-bottom: 120px; padding: 15px; }
        .stat-circle { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; transition: all 0.4s ease; position: relative; }
        .stat-val { font-size: 13px; font-weight: 900; transition: color 0.3s ease; }
        .stat-lab { font-size: 7px; font-weight: 900; color: #444; text-transform: uppercase; margin-top: 1px; }
        
        /* Neon Glows */
        .glow-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); border-color: var(--neon) !important; }
        .glow-orange { box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); border-color: var(--reset) !important; }
        .glow-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); border-color: var(--nn) !important; }

        /* Habit Cards */
        .habit-card { background: var(--panel); border: 1px solid var(--border); border-radius: 1.25rem; margin-bottom: 10px; display: flex; align-items: center; padding: 16px; position: relative; min-height: 85px; justify-content: space-between; }
        .nn-active { border-left: 4px solid var(--nn); }
        .nn-badge { position: absolute; left: 0; top: 0; background: var(--nn); color: white; font-size: 7px; font-weight: 900; padding: 2px 5px; border-bottom-right-radius: 6px; }
        
        /* Reordering Handles */
        .drag-handle { cursor: grab; padding: 10px; color: #333; display: flex; align-items: center; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.3; background: #222; }

        /* Insights Cards */
        .insight-card { background: #0a0a0a; border: 1px solid #222; border-radius: 1rem; padding: 15px; margin-bottom: 12px; }
        .blackbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .bb-item { background: #111; padding: 8px; border-radius: 8px; border: 1px solid #1a1a1a; }

        /* Picker/Modal */
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day-cell { aspect-ratio: 1/1; border: 2px solid #222; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 8px; position: relative; font-weight: 900; font-size: 15px; background: #0a0a0a; color: #666; }
        .cal-win { border-color: var(--neon) !important; background: rgba(34,197,94,0.3) !important; color: #fff !important; }
        .cal-loss { border-color: var(--nn) !important; background: rgba(239,68,68,0.3) !important; color: #fff !important; }

        .fixed-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); display: flex; height: 80px; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .nav-item.active { color: var(--neon); }
        .pill { background: rgba(34,197,94,0.1); border: 1px solid var(--neon); color: var(--neon); padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; white-space: nowrap; }
    </style>
</head>
<body>
    <div id="view-track">
        <header class="fixed-header">
            <div id="daily-quote" class="quote-banner text-[10px] font-black tracking-[0.15em] text-orange-500 uppercase">---</div>
            <div class="flex items-center gap-4">
                <button onclick="changeDay(-1)" class="text-2xl text-zinc-700 font-black">◂</button>
                <div class="cursor-pointer flex flex-col items-center" onclick="openCalendar()">
                    <p id="head-day" class="u-title text-[9px] font-black text-green-500 uppercase tracking-widest">---</p>
                    <h2 id="head-date" class="text-3xl font-black italic uppercase tracking-tighter">---</h2>
                </div>
                <button id="next-day-btn" onclick="changeDay(1)" class="text-2xl text-zinc-700 font-black">▸</button>
            </div>
            <div class="flex gap-3">
                <div id="score-circle" class="stat-circle"><span id="val-score" class="stat-val">0%</span><span class="stat-lab">Score</span></div>
                <div id="conquer-circle" class="stat-circle glow-green"><span class="stat-val text-green-500" id="val-conquer">0/75</span><span class="stat-lab">Conquer</span></div>
                <div class="stat-circle"><span class="stat-val" id="val-gone">0</span><span class="stat-lab">Days By</span></div>
            </div>
        </header>
        <main class="content-area">
            <div id="habit-feed"></div>
            <button onclick="updateAndLock()" class="w-full py-5 bg-green-500 text-black font-black rounded-2xl uppercase text-[11px] mt-4 mb-10">Update & Lock Day</button>
        </main>
    </div>

    <div id="view-build" class="hidden">
        <div class="p-6 pb-32">
            <h2 class="text-xl font-black uppercase italic mb-6 text-center">Constructor</h2>
            <div id="form-wrap" class="space-y-4">
                <input type="text" id="h-name" placeholder="HABIT NAME" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl font-black">
                <div class="grid grid-cols-7 gap-1" id="days-row">
                    <button class="day-btn h-10 bg-zinc-900 rounded border border-zinc-800 text-[10px] font-black active" onclick="this.classList.toggle('active'); this.classList.toggle('bg-green-500'); this.classList.toggle('text-black');">M</button>
                    </div>
                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-xl">
                    <span class="text-[9px] font-black uppercase">Non-Negotiable</span>
                    <input type="checkbox" id="h-nn" class="w-6 h-6 accent-green-500">
                </div>
                <button onclick="saveHabit()" id="forge-btn" class="w-full py-5 bg-white text-black font-black rounded-2xl uppercase text-[10px]">Forge Habit</button>
            </div>
            <div id="manifest-list" class="mt-8 space-y-2"></div>
        </div>
    </div>

    <div id="view-insights" class="hidden">
        <div class="p-6 pb-32">
            <h2 class="text-xl font-black uppercase italic mb-6 text-center">Intelligence</h2>
            <div id="insights-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="mod-cal" class="modal">
        <div class="flex justify-between items-center mb-6">
            <button onclick="closeM('mod-cal')" class="text-2xl">✕</button>
            <div class="text-center">
                <p id="cal-head-day" class="u-title text-green-500 font-black text-[9px] uppercase">---</p>
                <h2 id="cal-head-date" class="text-xl font-black uppercase italic">---</h2>
            </div>
            <div class="w-8"></div>
        </div>
        <div id="cal-grid" class="cal-grid"></div>
    </div>

    <nav class="fixed-nav">
        <div class="nav-item active" id="n-track" onclick="nav('track')">Track</div>
        <div class="nav-item" id="n-build" onclick="nav('build')">Build</div>
        <div class="nav-item" id="n-insights" onclick="nav('insights')">Insights</div>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script>
        let manifest = JSON.parse(localStorage.getItem('M_BREAD_V11')) || [];
        let logs = JSON.parse(localStorage.getItem('L_BREAD_V11')) || {};
        let config = JSON.parse(localStorage.getItem('C_BREAD_V11')) || { goal: 75, pass: 100 };
        let activeDate = new Date().toISOString().split('T')[0];
        let todayStr = new Date().toISOString().split('T')[0];

        // Nav Logic
        function nav(v) {
            ['view-track', 'view-build', 'view-insights'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
            ['n-track', 'n-build', 'n-insights'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById('n-' + v).classList.add('active');
            if(v==='build') renderManifest();
            if(v==='insights') renderInsights();
            if(v==='track') renderTrack();
        }

        // Daily Logic
        function getDailyStatus(dateStr) {
            const d = new Date(dateStr);
            const dayIdx = d.getDay();
            const habits = manifest.filter(h => h.days.includes(dayIdx));
            if(!habits.length) return { score: 100, pass: true };
            let done = 0, nnFail = false;
            habits.forEach(h => {
                const isDone = logs[dateStr]?.[h.id]?.done;
                if(isDone) done++;
                if(h.nn && !isDone) nnFail = true;
            });
            const score = Math.round((done/habits.length)*100);
            return { score, pass: (!nnFail && score >= config.pass) };
        }

        function renderTrack() {
            const feed = document.getElementById('habit-feed'); feed.innerHTML = '';
            const dayIdx = new Date(activeDate).getDay();
            const habits = manifest.filter(h => h.days.includes(dayIdx));
            
            habits.forEach(h => {
                const isDone = logs[activeDate]?.[h.id]?.done || false;
                feed.innerHTML += `
                    <div class="habit-card ${h.nn ? 'nn-active' : ''}">
                        ${h.nn ? '<div class="nn-badge">NN</div>' : ''}
                        <div class="flex-1 mr-4">
                            <p class="font-bold text-sm uppercase">${h.name}</p>
                        </div>
                        <div class="check-box w-12 h-12 border-2 border-zinc-800 rounded-xl flex items-center justify-center ${isDone ? 'bg-green-500 border-green-500 text-black' : ''}" 
                             onclick="toggleHabit('${h.id}')">
                            ${isDone ? '✓' : ''}
                        </div>
                    </div>`;
            });
            syncHeader();
        }

        function syncHeader() {
            const d = new Date(activeDate);
            document.getElementById('head-date').innerText = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            document.getElementById('head-day').innerText = d.toLocaleDateString('en-GB', { weekday: 'long' });
            
            const s = getDailyStatus(activeDate);
            const scoreVal = document.getElementById('val-score');
            const scoreCirc = document.getElementById('score-circle');
            scoreVal.innerText = s.score + '%';
            
            scoreCirc.className = 'stat-circle'; // Reset
            if (s.score >= config.pass) { scoreCirc.classList.add('glow-green'); scoreVal.style.color = 'var(--neon)'; }
            else if (s.score >= (config.pass * 0.7)) { scoreCirc.classList.add('glow-orange'); scoreVal.style.color = 'var(--reset)'; }
            else { scoreCirc.classList.add('glow-red'); scoreVal.style.color = 'var(--nn)'; }
        }

        function toggleHabit(id) {
            if(!logs[activeDate]) logs[activeDate] = {};
            if(!logs[activeDate][id]) logs[activeDate][id] = { done: false };
            logs[activeDate][id].done = !logs[activeDate][id].done;
            renderTrack();
        }

        // Reordering & Build
        function renderManifest() {
            const list = document.getElementById('manifest-list');
            list.innerHTML = '';
            manifest.forEach(h => {
                list.innerHTML += `
                    <div class="p-4 bg-zinc-900 rounded-xl flex items-center border border-zinc-800" data-id="${h.id}">
                        <div class="drag-handle">☰</div>
                        <div class="flex-1 px-2 font-black text-[10px] uppercase">${h.name}</div>
                        <button onclick="delH('${h.id}')" class="text-red-500 font-black">✕</button>
                    </div>`;
            });

            new Sortable(list, {
                handle: '.drag-handle',
                animation: 150,
                onEnd: () => {
                    const newOrder = Array.from(list.children).map(el => el.dataset.id);
                    manifest.sort((a,b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
                    localStorage.setItem('M_BREAD_V11', JSON.stringify(manifest));
                }
            });
        }

        // Insights / Blackbox
        function renderInsights() {
            const list = document.getElementById('insights-list');
            list.innerHTML = '';
            
            manifest.forEach(h => {
                let streak = 0, totalHits = 0, totalDays = 0;
                const sortedLogs = Object.keys(logs).sort().reverse();
                
                // Calculate Specific Habit Stats
                for(let date of sortedLogs) {
                    const dayIdx = new Date(date).getDay();
                    if(h.days.includes(dayIdx)) {
                        totalDays++;
                        if(logs[date][h.id]?.done) {
                            totalHits++;
                            streak++;
                        } else {
                            if(date !== todayStr) break; // Break streak only if past failure
                        }
                    }
                }
                const rate = totalDays ? Math.round((totalHits/totalDays)*100) : 0;

                list.innerHTML += `
                    <div class="insight-card">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-sm uppercase italic">${h.name}</h3>
                            <span class="text-[10px] font-black ${rate >= 80 ? 'text-green-500' : 'text-orange-500'}">${rate}%</span>
                        </div>
                        <div class="blackbox-grid">
                            <div class="bb-item">
                                <p class="text-[7px] text-zinc-500 uppercase font-black">Current Streak</p>
                                <p class="text-lg font-black">${streak} <span class="text-[10px]">DAYS</span></p>
                            </div>
                            <div class="bb-item">
                                <p class="text-[7px] text-zinc-500 uppercase font-black">Total Hits</p>
                                <p class="text-lg font-black">${totalHits}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function openCalendar() {
            const g = document.getElementById('cal-grid'); g.innerHTML = '';
            const now = new Date(activeDate);
            document.getElementById('cal-head-day').innerText = now.toLocaleDateString('en-GB', { weekday: 'long' });
            document.getElementById('cal-head-date').innerText = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for(let d=1; d<=lastDay; d++) {
                const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const r = getDailyStatus(ds);
                const isLogged = logs[ds];
                g.innerHTML += `<div class="cal-day-cell ${isLogged ? (r.pass ? 'cal-win' : 'cal-loss') : ''}" onclick="activeDate='${ds}'; closeM('mod-cal'); renderTrack();">${d}</div>`;
            }
            document.getElementById('mod-cal').style.display = 'flex';
        }

        function saveHabit() {
            const name = document.getElementById('h-name').value;
            if(!name) return;
            const h = { id: 'h' + Date.now(), name, days: [1,2,3,4,5,6,0], nn: document.getElementById('h-nn').checked };
            manifest.push(h);
            localStorage.setItem('M_BREAD_V11', JSON.stringify(manifest));
            document.getElementById('h-name').value = '';
            renderManifest();
        }

        function delH(id) { manifest = manifest.filter(x => x.id !== id); localStorage.setItem('M_BREAD_V11', JSON.stringify(manifest)); renderManifest(); }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }
        function changeDay(o) { let d = new Date(activeDate); d.setDate(d.getDate() + o); activeDate = d.toISOString().split('T')[0]; renderTrack(); }
        function updateAndLock() { localStorage.setItem('L_BREAD_V11', JSON.stringify(logs)); alert('DATA SYNCED'); }

        nav('track');
    </script>
</body>
</html>
