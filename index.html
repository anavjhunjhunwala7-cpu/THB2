<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE HABIT BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #22c55e; --bg: #000000; --panel: #111111; --border: #222222; --nn: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* HEADER LOGIC */
        .header-wrap { position: fixed; top: 0; width: 100%; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; padding: 15px 20px; }
        .content-area { margin-top: 240px; margin-bottom: 120px; padding: 20px; }
        .build-area { margin-top: 20px; } /* Build doesn't need the massive fixed header */

        .quote-bar { width: 100%; text-align: center; padding: 6px; background: #0a0a0a; border: 1px solid #111; border-radius: 6px; margin-bottom: 15px; }
        .quote-text { font-size: 9px; font-weight: 800; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }

        /* INPUTS */
        input[type="text"], input[type="number"], textarea { 
            background: #0a0a0a; border: 1px solid #222; color: white; 
            padding: 12px; border-radius: 12px; width: 100%; outline: none; 
            font-size: 16px; height: 50px;
        }
        .header-input { background: #111; border: 1px solid #333; border-radius: 6px; font-size: 11px; font-weight: 900; color: var(--neon); width: 45px; text-align: center; padding: 4px; }

        /* NAV */
        .fixed-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); z-index: 200; display: flex; height: 80px; padding-bottom: env(safe-area-inset-bottom); }
        .nav-link { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
        .nav-link.active { color: var(--neon); border-top: 2px solid var(--neon); }

        /* CARDS */
        .habit-card { background: var(--panel); border: 1px solid var(--border); border-radius: 1.25rem; padding: 1.25rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .habit-card.nn-fail { border-left: 4px solid var(--nn); }
        
        .pill { background: rgba(34,197,94,0.1); border: 1px solid var(--neon); color: var(--neon); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; margin: 2px; }
        .check-box { width: 42px; height: 42px; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .check-box.active { background: var(--neon); border-color: var(--neon); color: #000; }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 25px; }
        .cal-grid { display: grid; grid-cols-7 gap: 2px; }
        .cal-day { aspect-ratio: 1; border: 1px solid #222; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; }
        
        .day-btn { width: 100%; aspect-ratio: 1; background: #111; border: 1px solid #222; border-radius: 8px; font-size: 10px; font-weight: 900; color: #444; }
        .day-btn.active { background: var(--neon); color: #000; }
    </style>
</head>
<body>

    <div id="view-track">
        <header class="header-wrap">
            <div class="quote-bar"><span class="quote-text">Suffer the pain of discipline or the pain of regret.</span></div>
            <div class="flex flex-col items-center cursor-pointer" onclick="openCalendar()">
                <p id="display-day" class="text-[10px] font-black text-green-500 uppercase tracking-widest mb-1">---</p>
                <h2 id="display-date" class="text-4xl font-black italic uppercase tracking-tighter">---</h2>
            </div>
            <div class="flex justify-center gap-6 mt-4">
                <div class="flex flex-col items-center"><span class="text-[7px] font-black mb-1">PASS %</span><input type="number" id="global-target" value="80" class="header-input"></div>
                <div class="w-16 h-16 rounded-full border-2 border-zinc-800 flex items-center justify-center bg-zinc-900"><span class="text-sm font-black" id="score-val">0%</span></div>
                <div class="flex flex-col items-center"><span class="text-[7px] font-black mb-1">GOAL</span><input type="number" id="campaign-goal" value="365" class="header-input"></div>
            </div>
        </header>
        <main class="content-area">
            <div id="habit-feed" class="space-y-3"></div>
            <button onclick="alert('Day Logged')" class="w-full py-5 mt-6 bg-zinc-900 border border-zinc-700 text-white font-black uppercase rounded-2xl text-[10px] tracking-widest">Conquer Today</button>
        </main>
    </div>

    <div id="view-build" class="hidden p-6 pb-24">
        <h2 class="text-center font-black italic uppercase tracking-widest text-xl mb-8">Constructor</h2>
        <div class="space-y-4 bg-[#0a0a0a] p-6 rounded-3xl border border-zinc-900">
            <input type="text" id="h-name" placeholder="HABIT NAME">
            <div class="flex bg-zinc-900 p-1 rounded-xl">
                <button id="type-fixed" class="flex-1 py-3 text-[9px] font-black rounded-lg bg-zinc-800" onclick="setType('fixed')">FIXED</button>
                <button id="type-flex" class="flex-1 py-3 text-[9px] font-black text-zinc-600" onclick="setType('flex')">FLEXIBLE</button>
            </div>
            <div id="section-fixed" class="grid grid-cols-7 gap-1">
                <button class="day-btn active" data-day="1" onclick="this.classList.toggle('active')">M</button>
                <button class="day-btn active" data-day="2" onclick="this.classList.toggle('active')">T</button>
                <button class="day-btn active" data-day="3" onclick="this.classList.toggle('active')">W</button>
                <button class="day-btn active" data-day="4" onclick="this.classList.toggle('active')">T</button>
                <button class="day-btn active" data-day="5" onclick="this.classList.toggle('active')">F</button>
                <button class="day-btn active" data-day="6" onclick="this.classList.toggle('active')">S</button>
                <button class="day-btn active" data-day="0" onclick="this.classList.toggle('active')">S</button>
            </div>
            <div id="section-flex" class="hidden"><input type="number" id="h-freq" placeholder="Times Per Week (1-7)"></div>
            <div class="flex items-center justify-between p-3 bg-zinc-900/40 rounded-xl">
                <span class="text-[9px] font-black uppercase">Non-Negotiable</span>
                <input type="checkbox" id="h-nn" class="w-5 h-5">
            </div>
            <div class="border-t border-zinc-800 pt-4 space-y-3">
                <div class="flex justify-between items-center"><span class="text-[9px] font-black">NUMERIC LOGIC</span><input type="checkbox" id="use-num"></div>
                <div class="grid grid-cols-3 gap-2"><input type="number" id="h-min" placeholder="MIN"><input type="number" id="h-max" placeholder="MAX"><input type="number" id="h-step" placeholder="STEP"></div>
                <input type="text" id="h-unit" placeholder="UNIT (e.g. reps, s)">
                <div class="flex justify-between items-center"><span class="text-[9px] font-black">TAG OPTIONS</span><input type="checkbox" id="use-opt"></div>
                <textarea id="h-tags" placeholder="Option A, Option B..." class="h-24 p-3"></textarea>
                <div class="flex gap-4"><label class="text-[9px] font-black flex items-center gap-2">MULTI <input type="checkbox" id="h-multi"></label></div>
            </div>
            <button onclick="saveHabit()" class="w-full py-4 bg-white text-black font-black uppercase rounded-xl text-[10px]">Forge Habit</button>
        </div>
        <div id="manifest-list" class="mt-8 space-y-2"></div>
    </div>

    <div id="calendar-modal" class="modal">
        <div class="flex justify-between items-center mb-8">
            <button onclick="closeModal('calendar-modal')" class="w-12 h-12 bg-zinc-900 rounded-full">✕</button>
            <h3 class="font-black uppercase tracking-widest text-xs">Calendar</h3>
            <div class="w-12"></div>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
    </div>

    <div id="picker-modal" class="modal">
        <div class="flex justify-between items-center mb-8">
            <button onclick="closeModal('picker-modal')" class="w-12 h-12 bg-zinc-900 rounded-full">✕</button>
            <h3 id="modal-title" class="font-black uppercase tracking-widest text-xs">LOG DATA</h3>
            <button onclick="closeModal('picker-modal')" class="w-12 h-12 bg-green-500 text-black rounded-full font-bold">✓</button>
        </div>
        <div id="modal-content" class="grid grid-cols-2 gap-3 overflow-y-auto"></div>
    </div>

    <nav class="fixed-nav">
        <div onclick="nav('track')" class="nav-link" id="n-track">Track</div>
        <div onclick="nav('build')" class="nav-link" id="n-build">Build</div>
    </nav>

    <script>
        let manifest = JSON.parse(localStorage.getItem('M26')) || [];
        let logs = JSON.parse(localStorage.getItem('L26')) || {};
        let activeDate = new Date().toISOString().split('T')[0];
        let activeType = 'fixed';
        let currentHId = null;

        function nav(v) {
            document.getElementById('view-track').classList.toggle('hidden', v !== 'track');
            document.getElementById('view-build').classList.toggle('hidden', v !== 'build');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('n-' + v).classList.add('active');
            if(v === 'track') renderTrack(); else renderManifest();
        }

        function setType(t) {
            activeType = t;
            document.getElementById('type-fixed').className = t==='fixed'?'flex-1 py-3 text-[9px] font-black rounded-lg bg-zinc-800':'flex-1 py-3 text-[9px] font-black text-zinc-600';
            document.getElementById('type-flex').className = t==='flex'?'flex-1 py-3 text-[9px] font-black rounded-lg bg-zinc-800':'flex-1 py-3 text-[9px] font-black text-zinc-600';
            document.getElementById('section-fixed').classList.toggle('hidden', t === 'flex');
            document.getElementById('section-flex').classList.toggle('hidden', t === 'fixed');
        }

        function renderTrack() {
            const feed = document.getElementById('habit-feed'); feed.innerHTML = '';
            const dayIdx = new Date(activeDate).getDay();
            const target = parseInt(document.getElementById('global-target').value);

            const habits = manifest.filter(h => {
                if(h.type === 'fixed') return h.days.includes(dayIdx);
                // Simple flex check: if not logged today, show it
                return !logs[activeDate]?.[h.id];
            });

            let doneCount = 0, nnFail = false;

            habits.forEach(h => {
                const log = logs[activeDate]?.[h.id] || { n: null, t: [], c: false };
                const isDone = (h.useNum ? log.n !== null : true) && (h.useOpt ? log.t.length > 0 : true) && ((!h.useNum && !h.useOpt) ? log.c : true);
                if(isDone) doneCount++; else if(h.nn) nnFail = true;

                let pillUI = '';
                if(log.n !== null) pillUI += `<div class="pill">${log.n} ${h.unit}</div>`;
                log.t.forEach(tag => pillUI += `<div class="pill">${tag}</div>`);

                feed.innerHTML += `
                <div class="habit-card ${h.nn && !isDone ? 'nn-fail' : ''}">
                    <div class="flex-1">
                        <p class="font-black text-xs uppercase ${isDone?'text-white':'text-zinc-700'}">${h.name}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex flex-wrap justify-end" onclick="openPicker('${h.id}')">${pillUI || (h.useNum||h.useOpt?'<span class="text-[8px] text-zinc-600 font-bold">ADD+</span>':'')}</div>
                        <div class="check-box ${isDone?'active':''}" onclick="toggleH('${h.id}')">${isDone?'✓':''}</div>
                    </div>
                </div>`;
            });

            const rawScore = habits.length ? Math.round((doneCount / habits.length) * 100) : 0;
            const finalScore = nnFail ? 0 : rawScore;
            document.getElementById('score-val').innerText = finalScore + '%';
            document.getElementById('display-date').innerText = new Date(activeDate).toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
            document.getElementById('display-day').innerText = new Date(activeDate).toLocaleDateString('en-GB', {weekday:'long'});
        }

        function openPicker(id) {
            currentHId = id; const h = manifest.find(x=>x.id===id);
            const log = logs[activeDate]?.[id] || { n:null, t:[] };
            document.getElementById('modal-title').innerText = h.name.toUpperCase();
            const cont = document.getElementById('modal-content'); cont.innerHTML = '';
            
            if(h.useNum) {
                for(let i=h.min; i<=h.max; i+=h.step) {
                    cont.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl border ${log.n===i?'border-green-500 text-green-500':'border-zinc-800'} text-center font-bold" onclick="setNum(${i})">${i} ${h.unit}</div>`;
                }
            }
            if(h.useOpt) {
                h.tags.forEach(t => {
                    cont.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl border ${log.t.includes(t)?'border-green-500 text-green-500':'border-zinc-800'} text-center font-bold" onclick="setTag('${t}')">${t}</div>`;
                });
            }
            document.getElementById('picker-modal').style.display = 'flex';
        }

        function setNum(v) { ensureLog(); logs[activeDate][currentHId].n = v; save(); openPicker(currentHId); }
        function setTag(t) { 
            ensureLog(); const h = manifest.find(x=>x.id===currentHId);
            let l = logs[activeDate][currentHId];
            l.t = h.multi ? (l.t.includes(t)?l.t.filter(x=>x!==t):[...l.t,t]) : [t];
            save(); openPicker(currentHId);
        }

        function saveHabit() {
            const h = {
                id: 'h'+Date.now(), name: document.getElementById('h-name').value, type: activeType,
                days: Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.day)),
                freq: parseInt(document.getElementById('h-freq').value || 0), nn: document.getElementById('h-nn').checked,
                useNum: document.getElementById('use-num').checked, useOpt: document.getElementById('use-opt').checked,
                min: parseFloat(document.getElementById('h-min').value || 0), max: parseFloat(document.getElementById('h-max').value || 0),
                step: parseFloat(document.getElementById('h-step').value || 1), unit: document.getElementById('h-unit').value || '',
                tags: document.getElementById('h-tags').value.split(',').map(t => t.trim()).filter(t => t), multi: document.getElementById('h-multi').checked
            };
            if(h.name) { manifest.push(h); localStorage.setItem('M26', JSON.stringify(manifest)); nav('track'); }
        }

        function openCalendar() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const target = parseInt(document.getElementById('global-target').value);
            for(let i=1; i<=30; i++) {
                grid.innerHTML += `<div class="cal-day bg-zinc-900 border-zinc-800" onclick="closeModal('calendar-modal')">${i}</div>`;
            }
            document.getElementById('calendar-modal').style.display = 'flex';
        }

        function toggleH(id) { currentHId = id; ensureLog(); logs[activeDate][id].c = !logs[activeDate][id].c; save(); }
        function ensureLog() { if(!logs[activeDate]) logs[activeDate] = {}; if(!logs[activeDate][currentHId]) logs[activeDate][currentHId] = { n:null, t:[], c:false }; }
        function save() { localStorage.setItem('L26', JSON.stringify(logs)); renderTrack(); }
        function closeModal(m) { document.getElementById(m).style.display = 'none'; }
        function renderManifest() { document.getElementById('manifest-list').innerHTML = manifest.map(h => `<div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center text-[10px] font-bold"><span>${h.name.toUpperCase()}</span><button onclick="delH('${h.id}')">✕</button></div>`).join(''); }
        function delH(id) { manifest = manifest.filter(x=>x.id!==id); localStorage.setItem('M26', JSON.stringify(manifest)); renderManifest(); }

        nav('track');
    </script>
</body>
</html>
