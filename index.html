<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE HABIT BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #22c55e; --bg: #000000; --panel: #111111; --border: #222222; --nn: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        .fixed-header { position: fixed; top: 0; width: 100%; height: 240px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .content-area { margin-top: 250px; margin-bottom: 100px; padding: 15px; }
        
        /* BUILDER FIXES */
        .input-dark { background: #0a0a0a; border: 1px solid #222; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .chk-box-custom { width: 24px; height: 24px; accent-color: var(--neon); cursor: pointer; flex-shrink: 0; }
        
        /* HABIT CARD ARCHITECTURE */
        .habit-card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 1.25rem; 
            margin-bottom: 10px; display: flex; align-items: center; padding: 16px; 
            position: relative; min-height: 85px; 
        }
        .habit-card.nn-active { border-left: 4px solid var(--nn); }
        .nn-indicator { position: absolute; left: 0; top: 0; background: var(--nn); color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; border-bottom-right-radius: 8px; }
        
        .pill-scroll { display: flex; overflow-x: auto; gap: 6px; padding-bottom: 4px; scrollbar-width: none; }
        .pill-scroll::-webkit-scrollbar { display: none; }
        .pill { background: rgba(34,197,94,0.1); border: 1px solid var(--neon); color: var(--neon); padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; white-space: nowrap; }
        
        .set-btn { font-size: 10px; font-weight: 900; color: var(--neon); padding: 6px 12px; border: 1px dashed var(--neon); border-radius: 8px; text-transform: uppercase; }
        .check-circle { width: 40px; height: 40px; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .check-circle.active { background: var(--neon); border-color: var(--neon); color: #000; }

        .u-title { font-size: 10px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 20px; }
        
        .cal-day { aspect-ratio: 1; border: 1px solid #222; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .fixed-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); display: flex; height: 80px; z-index: 200; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .nav-item.active { color: var(--neon); }
    </style>
</head>
<body>

    <div id="view-track">
        <header class="fixed-header">
            <div class="w-full text-center mb-4"><span class="u-title">March 2026</span></div>
            <div class="flex flex-col items-center mb-6" onclick="openCalendar()">
                <p id="head-day" class="text-green-500 font-black text-[10px] uppercase tracking-widest">---</p>
                <h1 id="head-date" class="text-5xl font-black italic tracking-tighter uppercase">---</h1>
            </div>
            <div class="flex gap-6">
                <div class="text-center"><p class="stat-val text-xl font-black" id="stat-score">0%</p><p class="u-title">Score</p></div>
                <div class="text-center"><p class="stat-val text-xl font-black text-green-500" id="stat-conquer">0</p><p class="u-title">Wins</p></div>
            </div>
        </header>

        <main class="content-area" id="habit-feed"></main>
    </div>

    <div id="view-build" class="hidden p-6 pb-32">
        <h2 class="text-2xl font-black uppercase italic mb-6">Constructor</h2>
        <div class="space-y-4" id="build-form">
            <input type="text" id="h-name" placeholder="HABIT NAME" class="input-dark font-bold text-lg">
            
            <div class="flex bg-zinc-900 p-1 rounded-xl">
                <button id="btn-fixed" class="flex-1 py-3 text-[10px] font-black rounded-lg bg-zinc-800" onclick="setMode('fixed')">FIXED</button>
                <button id="btn-flex" class="flex-1 py-3 text-[10px] font-black text-zinc-500" onclick="setMode('flex')">FLEX</button>
            </div>

            <div id="box-fixed" class="grid grid-cols-7 gap-1">
                <button class="day-btn active" data-d="1">M</button><button class="day-btn active" data-d="2">T</button><button class="day-btn active" data-d="3">W</button>
                <button class="day-btn active" data-d="4">T</button><button class="day-btn active" data-d="5">F</button><button class="day-btn active" data-d="6">S</button>
                <button class="day-btn active" data-d="0">S</button>
            </div>
            <div id="box-flex" class="hidden"><input type="number" id="h-freq" placeholder="Times per week" class="input-dark"></div>

            <div class="flex items-center justify-between p-4 bg-zinc-900 rounded-xl">
                <span class="u-title text-white">Non-Negotiable</span>
                <input type="checkbox" id="h-nn" class="chk-box-custom">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-3 bg-zinc-900 rounded-xl space-y-2">
                    <div class="flex justify-between items-center"><span class="u-title">Numeric</span><input type="checkbox" id="h-useNum" class="chk-box-custom"></div>
                    <div class="flex gap-1"><input type="number" id="h-min" placeholder="Min" class="input-dark text-xs"><input type="number" id="h-max" placeholder="Max" class="input-dark text-xs"></div>
                    <input type="text" id="h-unit" placeholder="Unit (reps/s)" class="input-dark text-xs">
                </div>
                <div class="p-3 bg-zinc-900 rounded-xl space-y-2">
                    <div class="flex justify-between items-center"><span class="u-title">Tags</span><input type="checkbox" id="h-useOpt" class="chk-box-custom"></div>
                    <textarea id="h-tags" placeholder="A, B, C..." class="input-dark text-xs h-20"></textarea>
                </div>
            </div>

            <div class="flex gap-4 p-4 bg-zinc-900 rounded-xl">
                <label class="flex items-center gap-2 u-title text-white">Multi <input type="checkbox" id="h-multi" class="chk-box-custom"></label>
                <label class="flex items-center gap-2 u-title text-white">Notes <input type="checkbox" id="h-notes" class="chk-box-custom"></label>
            </div>

            <button onclick="forge()" id="forge-main" class="w-full py-5 bg-white text-black font-black rounded-2xl uppercase tracking-widest">Forge Habit</button>
            <button onclick="resetBuilder()" id="cancel-edit" class="hidden w-full py-3 text-zinc-500 font-bold">Cancel Edit</button>
        </div>
        <div id="manifest-list" class="mt-10 space-y-2"></div>
    </div>

    <div id="mod-cal" class="modal">
        <div class="flex justify-between items-center mb-8"><button onclick="closeM('mod-cal')" class="text-2xl">✕</button><span class="u-title">Calendar</span><div></div></div>
        <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-zinc-600 mb-2">
            <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
        </div>
        <div id="cal-grid" class="grid grid-cols-7 gap-2"></div>
    </div>

    <div id="mod-pick" class="modal">
        <div class="flex justify-between items-center mb-6"><button onclick="closeM('mod-pick')">✕</button><h3 id="pick-title" class="u-title text-white">Log</h3><button onclick="closeM('mod-pick')" class="text-green-500 font-black">SAVE</button></div>
        <div id="pick-options" class="grid grid-cols-2 gap-3 overflow-y-auto max-h-[60vh]"></div>
        <textarea id="pick-notes" placeholder="Session notes..." class="input-dark mt-4 hidden" style="height:120px"></textarea>
        <button onclick="clearEntry()" class="mt-auto w-full py-4 bg-red-900/20 text-red-500 font-black rounded-xl">RESET ENTRY</button>
    </div>

    <nav class="fixed-nav">
        <div class="nav-item active" id="nav-track" onclick="showV('track')">Track</div>
        <div class="nav-item" id="nav-build" onclick="showV('build')">Build</div>
    </nav>

    <script>
        let habits = JSON.parse(localStorage.getItem('H_V5')) || [];
        let logs = JSON.parse(localStorage.getItem('L_V5')) || {};
        let activeDate = new Date().toISOString().split('T')[0];
        let buildMode = 'fixed';
        let editId = null;
        let curHId = null;

        // DAY SELECTOR FOR BUILDER
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.onclick = () => btn.classList.toggle('active');
        });

        function showV(v) {
            document.getElementById('view-track').classList.toggle('hidden', v !== 'track');
            document.getElementById('view-build').classList.toggle('hidden', v !== 'build');
            document.getElementById('nav-track').classList.toggle('active', v === 'track');
            document.getElementById('nav-build').classList.toggle('active', v === 'build');
            if(v==='track') renderTrack(); else renderManifest();
        }

        function setMode(m) {
            buildMode = m;
            document.getElementById('btn-fixed').classList.toggle('bg-zinc-800', m==='fixed');
            document.getElementById('btn-flex').classList.toggle('bg-zinc-800', m==='flex');
            document.getElementById('box-fixed').classList.toggle('hidden', m==='flex');
            document.getElementById('box-flex').classList.toggle('hidden', m==='fixed');
        }

        function forge() {
            const h = {
                id: editId || 'h' + Date.now(),
                name: document.getElementById('h-name').value,
                type: buildMode,
                days: Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.d)),
                freq: parseInt(document.getElementById('h-freq').value || 0),
                nn: document.getElementById('h-nn').checked,
                useNum: document.getElementById('h-useNum').checked,
                min: parseFloat(document.getElementById('h-min').value || 0),
                max: parseFloat(document.getElementById('h-max').value || 0),
                unit: document.getElementById('h-unit').value,
                useOpt: document.getElementById('h-useOpt').checked,
                tags: document.getElementById('h-tags').value.split(',').map(t => t.trim()).filter(t => t),
                multi: document.getElementById('h-multi').checked,
                notes: document.getElementById('h-notes').checked
            };
            if(!h.name) return;
            if(editId) {
                const idx = habits.findIndex(x => x.id === editId);
                habits[idx] = h;
            } else habits.push(h);
            localStorage.setItem('H_V5', JSON.stringify(habits));
            resetBuilder();
            showV('track');
        }

        function resetBuilder() {
            editId = null;
            document.getElementById('h-name').value = '';
            document.querySelectorAll('#build-form input[type="checkbox"]').forEach(c => c.checked = false);
            document.getElementById('h-tags').value = '';
            document.getElementById('forge-main').innerText = "Forge Habit";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        function renderTrack() {
            const feed = document.getElementById('habit-feed');
            feed.innerHTML = '';
            const dayIdx = new Date(activeDate).getDay();
            
            const activeHabits = habits.filter(h => {
                if(h.type === 'fixed') return h.days.includes(dayIdx);
                return true; // Simple flex logic for now
            });

            activeHabits.forEach(h => {
                const l = logs[activeDate]?.[h.id] || { done: false, n: null, t: [] };
                const isDone = l.done;
                
                let pills = '';
                if(l.n !== null) pills += `<div class="pill">${l.n}${h.unit}</div>`;
                if(l.t) l.t.forEach(tag => pills += `<div class="pill">${tag}</div>`);

                feed.innerHTML += `
                    <div class="habit-card ${h.nn ? 'nn-active' : ''}">
                        ${h.nn ? '<div class="nn-indicator">NN</div>' : ''}
                        <div class="flex-1 overflow-hidden" onclick="openPicker('${h.id}')">
                            <p class="font-bold text-sm uppercase ${isDone ? 'text-zinc-500' : 'text-white'}">${h.name}</p>
                            <div class="pill-scroll mt-2">${pills || (h.useNum || h.useOpt ? '<div class="set-btn">SET</div>' : '')}</div>
                        </div>
                        <div class="check-circle ${isDone ? 'active' : ''}" onclick="toggleCheck('${h.id}')">
                            ${isDone ? '✓' : ''}
                        </div>
                    </div>
                `;
            });

            document.getElementById('head-date').innerText = new Date(activeDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            document.getElementById('head-day').innerText = new Date(activeDate).toLocaleDateString('en-GB', { weekday: 'long' });
            updateStats();
        }

        function toggleCheck(id) {
            if(!logs[activeDate]) logs[activeDate] = {};
            if(!logs[activeDate][id]) logs[activeDate][id] = { done: false, n: null, t: [] };
            logs[activeDate][id].done = !logs[activeDate][id].done;
            save();
        }

        function openPicker(id) {
            curHId = id;
            const h = habits.find(x => x.id === id);
            const l = logs[activeDate]?.[id] || { n: null, t: [] };
            document.getElementById('pick-title').innerText = h.name;
            const cont = document.getElementById('pick-options');
            cont.innerHTML = '';

            if(h.useNum) {
                for(let i=h.min; i<=h.max; i++) {
                    cont.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl border ${l.n == i ? 'border-green-500' : 'border-zinc-800'} text-center" onclick="setNum(${i})">${i}</div>`;
                }
            }
            if(h.useOpt) {
                h.tags.forEach(t => {
                    cont.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl border ${l.t.includes(t) ? 'border-green-500' : 'border-zinc-800'} text-center" onclick="setTag('${t}')">${t}</div>`;
                });
            }
            const nt = document.getElementById('pick-notes');
            nt.classList.toggle('hidden', !h.notes);
            nt.value = l.notes || '';
            nt.oninput = (e) => { ensureL(id); logs[activeDate][id].notes = e.target.value; save(); };

            document.getElementById('mod-pick').style.display = 'flex';
        }

        function setNum(v) { ensureL(curHId); logs[activeDate][curHId].n = v; save(); openPicker(curHId); }
        function setTag(t) { 
            ensureL(curHId); 
            const h = habits.find(x => x.id === curHId);
            let tags = logs[activeDate][curHId].t || [];
            if(h.multi) {
                tags = tags.includes(t) ? tags.filter(x => x !== t) : [...tags, t];
            } else tags = [t];
            logs[activeDate][curHId].t = tags;
            save(); openPicker(curHId);
        }

        function ensureL(id) { if(!logs[activeDate]) logs[activeDate] = {}; if(!logs[activeDate][id]) logs[activeDate][id] = { done: false, n: null, t: [] }; }
        function save() { localStorage.setItem('L_V5', JSON.stringify(logs)); renderTrack(); }
        function closeM(m) { document.getElementById(m).style.display = 'none'; }

        function openCalendar() {
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            const now = new Date(activeDate);
            const first = new Date(now.getFullYear(), now.getMonth(), 1);
            const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            const offset = (first.getDay() + 6) % 7;
            for(let i=0; i<offset; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=last.getDate(); d++) {
                const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                grid.innerHTML += `<div class="cal-day" onclick="selectDate('${dateStr}')">${d}</div>`;
            }
            document.getElementById('mod-cal').style.display = 'flex';
        }

        function selectDate(d) { activeDate = d; closeM('mod-cal'); renderTrack(); }
        
        function updateStats() {
            // Simplified score for the Win logic
            let done = 0;
            const dayIdx = new Date(activeDate).getDay();
            const hToday = habits.filter(h => h.type==='fixed' ? h.days.includes(dayIdx) : true);
            if(hToday.length > 0) {
                hToday.forEach(h => { if(logs[activeDate]?.[h.id]?.done) done++; });
                const score = Math.round((done/hToday.length)*100);
                document.getElementById('stat-score').innerText = score + '%';
            }
        }

        function renderManifest() {
            const m = document.getElementById('manifest-list');
            m.innerHTML = habits.map(h => `
                <div class="p-4 bg-zinc-900 rounded-xl flex justify-between border border-zinc-800">
                    <span class="font-bold uppercase text-[10px]">${h.name}</span>
                    <div class="flex gap-4">
                        <button onclick="editH('${h.id}')" class="text-zinc-500 font-bold text-[10px]">EDIT</button>
                        <button onclick="delH('${h.id}')" class="text-red-500 font-bold text-[10px]">✕</button>
                    </div>
                </div>
            `).join('');
        }
        function editH(id) { editId = id; const h = habits.find(x=>x.id===id); document.getElementById('h-name').value = h.name; document.getElementById('forge-main').innerText = "UPDATE"; document.getElementById('cancel-edit').classList.remove('hidden'); }
        function delH(id) { if(confirm('Delete?')) { habits = habits.filter(x=>x.id!==id); localStorage.setItem('H_V5', JSON.stringify(habits)); renderManifest(); } }
        function clearEntry() { if(confirm('Reset?')) { logs[activeDate][curHId] = { done:false, n:null, t:[] }; save(); closeM('mod-pick'); } }

        showV('track');
    </script>
</body>
</html>
