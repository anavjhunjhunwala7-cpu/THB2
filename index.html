<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE HABIT BUILDER</title>
    <style>
        :root { --neon: #22c55e; --bg: #000000; --panel: #111111; --border: #222222; --nn: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* Fixed UI */
        .fixed-header { position: fixed; top: 0; width: 100%; height: 70px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .fixed-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); display: flex; height: 85px; }
        .content-area { margin-top: 80px; margin-bottom: 140px; padding: 20px; }
        
        /* Cards & Elements */
        .habit-card { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .habit-card.nn { border-left: 5px solid var(--nn); }
        .u-title { font-size: 10px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; color: #555; }
        
        /* Buttons */
        .ui-btn { background: #1a1a1a; border: 1px solid #333; padding: 10px 14px; border-radius: 12px; font-size: 10px; font-weight: 900; color: #fff; text-transform: uppercase; text-align: center; min-width: 80px; }
        .ui-btn.has-data { border-color: var(--neon); color: var(--neon); }
        .check-box { width: 34px; height: 34px; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 900; }
        .check-box.active { background: var(--neon); border-color: var(--neon); color: #000; }

        /* Constructor Styling */
        .constructor-box { background: #0a0a0a; padding: 1.5rem; border-radius: 2rem; border: 1px solid #111; margin-bottom: 2rem; }
        input, textarea { background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 10px 0; }
        .day-btn { padding: 10px 0; background: #111; border: 1px solid #222; border-radius: 8px; font-size: 10px; font-weight: 900; color: #444; }
        .day-btn.active { background: var(--neon); color: #000; }
        .forge-btn { width: 100%; padding: 20px; background: #fff; color: #000; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }

        /* Navigation */
        .nav-link { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; text-decoration: none; }
        .nav-link.active { color: var(--neon); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; padding: 30px; }
        .tag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; }
        .tag-option { padding: 15px; border-radius: 12px; border: 1px solid #222; font-weight: 800; text-transform: uppercase; font-size: 10px; text-align: center; }
        .tag-option.active { border-color: var(--neon); color: var(--neon); background: rgba(34,197,94,0.1); }
        
        .hidden { display: none !important; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .space-y-3 > * + * { margin-top: 0.75rem; }
    </style>
</head>
<body>

    <header class="fixed-header">
        <div id="streak-counter" style="position:absolute; left:24px; color:orange; font-weight:900; font-style:italic; font-size:14px;">🔥 0</div>
        <span class="u-title" style="letter-spacing: 0.4em;">THE HABIT BUILDER</span>
        <div id="score-ring" style="position:absolute; right:24px;" class="u-title">0%</div>
    </header>

    <main class="content-area">
        <section id="view-track">
            <div style="margin-bottom: 2rem;">
                <p id="display-day" class="u-title" style="color:var(--neon); margin-bottom:4px;">---</p>
                <h2 id="display-date" style="font-size:36px; font-weight:900; font-style:italic; text-transform:uppercase; margin:0;">---</h2>
            </div>
            <div id="habit-feed" class="space-y-3"></div>
        </section>

        <section id="view-build" class="hidden">
            <h2 style="font-size:24px; font-weight:900; font-style:italic; text-transform:uppercase; margin-bottom:1.5rem;">Constructor</h2>
            <div class="constructor-box">
                <input type="text" id="h-name" placeholder="HABIT NAME" style="font-weight:800;">
                
                <div class="day-grid" id="h-days">
                    <button class="day-btn active" data-day="1">M</button><button class="day-btn active" data-day="2">T</button>
                    <button class="day-btn active" data-day="3">W</button><button class="day-btn active" data-day="4">T</button>
                    <button class="day-btn active" data-day="5">F</button><button class="day-btn active" data-day="6">S</button>
                    <button class="day-btn active" data-day="0">S</button>
                </div>

                <div class="flex items-center justify-between" style="padding:15px; background:#111; border-radius:12px; margin-bottom:15px;">
                    <span class="u-title" style="color:#aaa">Non-Negotiable</span>
                    <input type="checkbox" id="h-nn" style="width:20px; height:20px; margin:0;">
                </div>

                <div style="border-top: 1px solid #222; pt-4; margin-top:10px;">
                    <label class="u-title" style="display:flex; justify-content:space-between; margin:15px 0 10px 0;">Numeric <input type="checkbox" id="use-num" style="width:16px; margin:0;"></label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                        <input type="number" id="h-min" placeholder="MIN" style="font-size:12px;"> 
                        <input type="number" id="h-max" placeholder="MAX" style="font-size:12px;"> 
                        <input type="number" id="h-step" placeholder="STEP" style="font-size:12px;">
                    </div>
                    <input type="text" id="h-unit" placeholder="UNIT (E.G. KG, PAGES)" style="font-size:12px;">

                    <label class="u-title" style="display:flex; justify-content:space-between; margin:15px 0 10px 0;">Options <input type="checkbox" id="use-opt" style="width:16px; margin:0;"></label>
                    <textarea id="h-custom-tags" placeholder="OPT A, OPT B..." style="height:60px; font-size:12px;"></textarea>
                    
                    <div class="flex" style="gap:20px;">
                        <label class="u-title" style="display:flex; align-items:center; gap:5px;">Multi <input type="checkbox" id="h-multi" style="width:14px; margin:0;"></label>
                        <label class="u-title" style="display:flex; align-items:center; gap:5px;">Notes <input type="checkbox" id="use-text" style="width:14px; margin:0;"></label>
                    </div>
                </div>

                <button onclick="saveHabit()" class="forge-btn">Forge Habit</button>
            </div>
            <div id="manifest-list"></div>
        </section>
    </main>

    <div id="picker-modal" class="modal">
        <div class="flex items-center justify-between" style="margin-bottom:30px;">
            <button onclick="closeModal()" style="background:#111; color:#fff; border:none; width:45px; height:45px; border-radius:50%; font-size:20px;">✕</button>
            <h3 id="modal-title" class="u-title" style="color:#fff; font-size:12px;">---</h3>
            <button onclick="closeModal()" style="background:var(--neon); color:#000; border:none; width:45px; height:45px; border-radius:50%; font-weight:900;">✓</button>
        </div>
        <div id="modal-content" class="tag-grid"></div>
        <div id="modal-text-sec" class="hidden" style="margin-top:auto; padding-top:20px; border-top:1px solid #222;">
            <textarea id="modal-text-input" placeholder="Session notes..." onchange="syncModalText()" style="height:100px;"></textarea>
        </div>
    </div>

    <nav class="fixed-nav">
        <div onclick="nav('track')" class="nav-link" id="n-track"><span class="u-title">Track</span></div>
        <div onclick="nav('build')" class="nav-link" id="n-build"><span class="u-title">Build</span></div>
    </nav>

    <script>
        let manifest = JSON.parse(localStorage.getItem('F40_MANIFEST')) || [];
        let logs = JSON.parse(localStorage.getItem('F40_LOGS')) || {};
        let activeDate = new Date().toISOString().split('T')[0];
        let activePickerHabit = null;

        function init() {
            document.querySelectorAll('#h-days button').forEach(b => b.onclick = () => b.classList.toggle('active'));
            nav('track');
        }

        function nav(v) {
            document.getElementById('view-track').classList.toggle('hidden', v !== 'track');
            document.getElementById('view-build').classList.toggle('hidden', v !== 'build');
            document.getElementById('n-track').classList.toggle('active', v === 'track');
            document.getElementById('n-build').classList.toggle('active', v === 'build');
            if(v==='track') renderTrack(); else renderManifest();
        }

        function saveHabit() {
            const h = {
                id: 'h' + Date.now(),
                name: document.getElementById('h-name').value,
                days: Array.from(document.querySelectorAll('#h-days button.active')).map(b => parseInt(b.dataset.day)),
                nn: document.getElementById('h-nn').checked,
                useNum: document.getElementById('use-num').checked,
                useOpt: document.getElementById('use-opt').checked,
                useText: document.getElementById('use-text').checked,
                min: parseInt(document.getElementById('h-min').value || 0),
                max: parseInt(document.getElementById('h-max').value || 0),
                step: parseInt(document.getElementById('h-step').value || 1),
                unit: document.getElementById('h-unit').value || '',
                tags: document.getElementById('h-custom-tags').value.split(',').map(t => t.trim()).filter(t => t),
                multi: document.getElementById('h-multi').checked
            };
            if(!h.name) return;
            manifest.push(h);
            localStorage.setItem('F40_MANIFEST', JSON.stringify(manifest));
            nav('track');
        }

        function renderTrack() {
            const feed = document.getElementById('habit-feed'); feed.innerHTML = '';
            const dayIdx = new Date(activeDate).getDay();
            const todayHabits = manifest.filter(h => h.days.includes(dayIdx));
            let completed = 0; let nnFailed = false;

            todayHabits.forEach(h => {
                const log = logs[activeDate]?.[h.id] || { n: null, t: [], txt: '', c: false };
                const isDone = (h.useNum ? (log.n >= h.min) : true) && (h.useOpt ? (log.t.length > 0) : true) && ((!h.useNum && !h.useOpt) ? log.c : true);
                if(isDone) completed++;
                if(h.nn && !isDone) nnFailed = true;

                let btnLabel = "SET";
                if(log.n !== null) btnLabel = `${log.n}${h.unit}`;
                else if(log.t.length > 0) btnLabel = log.t[0];

                feed.innerHTML += `
                    <div class="habit-card ${h.nn?'nn':''}">
                        <div style="min-width:0; flex:1;">
                            <div style="font-weight:800; font-size:15px; ${isDone?'':'color:#555'}">${h.name.toUpperCase()}</div>
                            ${log.txt ? `<div style="font-size:10px; color:#555; font-style:italic;">${log.txt}</div>` : ''}
                        </div>
                        <div class="flex items-center" style="gap:10px;">
                            ${(h.useNum || h.useOpt || h.useText) ? `<button onclick="openPicker('${h.id}')" class="ui-btn ${btnLabel!=='SET'?'has-data':''}">${btnLabel}</button>` : ''}
                            <div class="check-box ${isDone?'active':''}" onclick="toggleManual('${h.id}')">${isDone?'✓':''}</div>
                        </div>
                    </div>`;
            });

            const score = todayHabits.length ? Math.round((completed/todayHabits.length)*100) : 0;
            document.getElementById('score-ring').innerText = (nnFailed ? 0 : score) + '%';
            document.getElementById('display-date').innerText = new Date(activeDate).toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
            document.getElementById('display-day').innerText = new Date(activeDate).toLocaleDateString('en-GB', {weekday:'long'});
        }

        function toggleManual(id) {
            if(!logs[activeDate]) logs[activeDate] = {};
            if(!logs[activeDate][id]) logs[activeDate][id] = { n:null, t:[], txt:'', c:false };
            logs[activeDate][id].c = !logs[activeDate][id].c;
            save();
        }

        function openPicker(id) {
            activePickerHabit = manifest.find(x => x.id === id);
            const log = logs[activeDate]?.[id] || { n: null, t: [], txt: '' };
            document.getElementById('modal-title').innerText = activePickerHabit.name;
            const content = document.getElementById('modal-content');
            content.innerHTML = '';

            if(activePickerHabit.useNum) {
                for(let i=activePickerHabit.min; i<=activePickerHabit.max; i+=activePickerHabit.step) {
                    content.innerHTML += `<div class="tag-option ${log.n === i ? 'active':''}" onclick="selectNum(${i})">${i}</div>`;
                }
            }
            if(activePickerHabit.useOpt) {
                activePickerHabit.tags.forEach(tag => {
                    content.innerHTML += `<div class="tag-option ${log.t.includes(tag)?'active':''}" onclick="selectTag('${tag}')">${tag}</div>`;
                });
            }
            document.getElementById('modal-text-sec').classList.toggle('hidden', !activePickerHabit.useText);
            document.getElementById('modal-text-input').value = log.txt || '';
            document.getElementById('picker-modal').style.display = 'flex';
        }

        function selectNum(v) { ensureLog(); logs[activeDate][activePickerHabit.id].n = v; save(); openPicker(activePickerHabit.id); }
        function selectTag(t) { 
            ensureLog(); let log = logs[activeDate][activePickerHabit.id];
            log.t = activePickerHabit.multi ? (log.t.includes(t) ? log.t.filter(x=>x!==t) : [...log.t, t]) : [t];
            save(); openPicker(activePickerHabit.id);
        }
        function syncModalText() { ensureLog(); logs[activeDate][activePickerHabit.id].txt = document.getElementById('modal-text-input').value; save(); }
        function ensureLog() { if(!logs[activeDate]) logs[activeDate] = {}; if(!logs[activeDate][activePickerHabit.id]) logs[activeDate][activePickerHabit.id] = { n:null, t:[], txt:'', c:false }; }
        function save() { localStorage.setItem('F40_LOGS', JSON.stringify(logs)); renderTrack(); }
        function closeModal() { document.getElementById('picker-modal').style.display = 'none'; }
        
        function renderManifest() {
            document.getElementById('manifest-list').innerHTML = manifest.map(h => `
                <div class="habit-card" style="padding:10px 20px;">
                    <span class="u-title" style="color:#eee">${h.name}</span>
                    <button onclick="deleteH('${h.id}')" style="background:none; border:none; color:red; font-weight:900;">✕</button>
                </div>`).join('');
        }
        function deleteH(id) { manifest = manifest.filter(x=>x.id!==id); localStorage.setItem('F40_MANIFEST', JSON.stringify(manifest)); renderManifest(); }

        init();
    </script>
</body>
</html>
