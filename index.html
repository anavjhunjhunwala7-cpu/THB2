<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE HABIT BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --neon: #22c55e; --bg: #000000; --panel: #111111; --border: #222222; --nn: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
        
        /* 1 & 6. SOPHISTICATED HEADER */
        .fixed-header { 
            position: fixed; top: 0; width: 100%; height: 250px; 
            background: var(--bg); border-bottom: 1px solid var(--border); 
            z-index: 100; display: flex; flex-direction: column; align-items: center;
            padding: 10px 20px;
        }

        .quote-bar {
            width: 100%; text-align: center; padding: 8px;
            background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 12px;
        }
        .quote-text { font-size: 9px; font-weight: 800; color: #666; letter-spacing: 0.15em; text-transform: uppercase; }

        .content-area { margin-top: 265px; margin-bottom: 120px; padding: 20px; }

        /* 2. EDITABLE INPUTS HEADER */
        .header-input { background: #111; border-bottom: 1px dashed #444; font-size: 11px; font-weight: 900; color: var(--neon); width: 35px; text-align: center; outline: none; }

        /* 1. SOPHISTICATED TEXT BOXES */
        input[type="text"], input[type="number"], textarea { 
            background: #0a0a0a; border: 1px solid #222; color: white; 
            padding: 12px 16px; border-radius: 12px; width: 100%; outline: none; 
            font-size: 15px; font-weight: 500; height: 50px; transition: 0.2s;
        }
        textarea { height: 100px !important; }
        input:focus { border-color: var(--neon); background: #0f0f0f; }

        /* 7. NAV HIGHLIGHT */
        .fixed-nav { position: fixed; bottom: 0; width: 100%; background: #050505; border-top: 1px solid var(--border); z-index: 100; display: flex; height: 85px; padding-bottom: env(safe-area-inset-bottom); }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: #444; }
        .nav-link.active { color: var(--neon); }
        .nav-link.active::after { content: ''; position: absolute; top: 0; width: 30%; height: 2px; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* 2. DAY SELECTOR */
        .day-btn { width: 100%; aspect-ratio: 1; background: #0a0a0a; border: 1px solid #222; border-radius: 10px; font-size: 10px; font-weight: 900; color: #444; }
        .day-btn.active { background: var(--neon); color: #000; border-color: var(--neon); box-shadow: 0 0 10px rgba(34,197,94,0.2); }

        .habit-card { background: var(--panel); border: 1px solid var(--border); border-radius: 1.25rem; padding: 1.25rem; margin-bottom: 0.75rem; transition: 0.3s; }
        .habit-card.nn-fail { border-left: 4px solid var(--nn); background: rgba(239,68,68,0.02); }
        
        .pill { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--neon); padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; margin: 2px; }
        
        .check-box { width: 40px; height: 40px; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .check-box.active { background: var(--neon); border-color: var(--neon); color: #000; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; padding: 25px; }
        .opt-box { padding: 18px 10px; border: 1px solid #222; border-radius: 14px; text-align: center; font-weight: 800; font-size: 13px; }
        .opt-box.active { border-color: var(--neon); color: var(--neon); background: rgba(34,197,94,0.1); }
        
        .u-title { font-size: 9px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: #444; }
    </style>
</head>
<body>
    <header class="fixed-header">
        <div class="quote-bar"><span class="quote-text">STRENGTH IS BUILT IN THE REPETITION</span></div>
        <div id="streak-count" class="absolute left-6 top-14 text-orange-500 font-black italic text-xs">🔥 0</div>

        <div class="cursor-pointer flex flex-col items-center mb-4" onclick="openCalendar()">
            <p id="display-day" class="u-title text-green-500 mb-0">---</p>
            <h2 id="display-date" class="text-4xl font-black italic uppercase tracking-tighter leading-none">---</h2>
        </div>

        <div class="flex gap-4">
            <div class="flex flex-col items-center"><span class="u-title mb-1" style="font-size:7px">PASS ✎</span><input type="number" id="global-target" value="80" onchange="renderTrack()" class="header-input"></div>
            <div class="w-[80px] h-[80px] rounded-full border-2 border-zinc-800 flex flex-col items-center justify-center bg-[#050505]" id="score-circle">
                <span class="text-lg font-black" id="score-val">0%</span>
                <span class="u-title" style="font-size:7px">SCORE</span>
            </div>
            <div class="flex flex-col items-center"><span class="u-title mb-1" style="font-size:7px">GOAL ✎</span><input type="number" id="campaign-goal" value="365" onchange="renderTrack()" class="header-input" style="color:#3b82f6; width:45px"></div>
        </div>
    </header>

    <main class="content-area">
        <section id="view-track">
            <div id="habit-feed" class="space-y-2"></div>
            <button onclick="conquerDay()" class="w-full py-5 mt-8 bg-zinc-900 border border-zinc-800 text-white font-black uppercase rounded-2xl tracking-[0.3em] text-[10px] active:scale-95 transition-all">Conquer Today</button>
        </section>
        
        <section id="view-build" class="hidden">
            <h2 class="text-center u-title mb-8 text-zinc-500">Constructor</h2>
            <div class="space-y-4 bg-[#080808] p-6 rounded-[2rem] border border-zinc-900">
                <input type="text" id="h-name" placeholder="HABIT NAME" class="font-bold">
                
                <div class="flex bg-zinc-900 p-1 rounded-xl">
                    <button id="type-fixed" class="flex-1 py-3 text-[9px] font-black rounded-lg bg-zinc-800" onclick="setHabitType('fixed')">FIXED</button>
                    <button id="type-flex" class="flex-1 py-3 text-[9px] font-black text-zinc-600" onclick="setHabitType('flex')">FLEXIBLE</button>
                </div>

                <div id="section-fixed" class="grid grid-cols-7 gap-1">
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="1">M</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="2">T</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="3">W</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="4">T</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="5">F</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="6">S</button>
                    <button class="day-btn active" onclick="this.classList.toggle('active')" data-day="0">S</button>
                </div>

                <div id="section-flex" class="hidden"><input type="number" id="h-freq" value="3" placeholder="Times Per Week"></div>

                <div class="flex items-center justify-between p-4 bg-zinc-900/20 border border-zinc-800 rounded-xl"><span class="u-title">Non-Negotiable</span><input type="checkbox" id="h-nn" class="w-5 h-5 accent-red-600"></div>
                
                <div class="space-y-3 pt-4 border-t border-zinc-900">
                    <div class="flex justify-between items-center"><span class="u-title">Numeric</span><input type="checkbox" id="use-num" class="w-4 h-4"></div>
                    <div class="grid grid-cols-3 gap-2"><input type="number" id="h-min" placeholder="MIN"><input type="number" id="h-max" placeholder="MAX"><input type="number" id="h-step" placeholder="STEP"></div>
                    <input type="text" id="h-unit" placeholder="UNIT (e.g. kg, reps)">
                    
                    <div class="flex justify-between items-center"><span class="u-title">Tags</span><input type="checkbox" id="use-opt" class="w-4 h-4"></div>
                    <textarea id="h-tags" placeholder="Option A, Option B..." class="p-4"></textarea>
                    
                    <div class="flex gap-4"><label class="u-title flex items-center gap-2">Multi <input type="checkbox" id="h-multi"></label><label class="u-title flex items-center gap-2">Notes <input type="checkbox" id="use-text"></label></div>
                </div>
                <button onclick="saveHabit()" class="w-full py-4 bg-white text-black font-black uppercase rounded-xl tracking-widest text-[10px]">Forge Habit</button>
            </div>
            <div id="manifest-list" class="mt-6 space-y-2 pb-20"></div>
        </section>
    </main>

    <div id="picker-modal" class="modal">
        <div class="flex items-center justify-between mb-8">
            <button onclick="closeModal()" class="w-12 h-12 bg-zinc-900 rounded-full">✕</button>
            <h3 id="modal-title" class="font-black uppercase tracking-widest text-xs">---</h3>
            <button onclick="closeModal()" class="w-12 h-12 bg-green-500 text-black rounded-full font-bold">✓</button>
        </div>
        <div id="modal-content" class="grid grid-cols-2 gap-3 mb-6 overflow-y-auto"></div>
        <textarea id="modal-text" onchange="syncText()" placeholder="Notes..." class="hidden mt-auto"></textarea>
    </div>

    <nav class="fixed-nav">
        <div onclick="nav('track')" class="nav-link" id="n-track"><span class="u-title">Track</span></div>
        <div onclick="nav('build')" class="nav-link" id="n-build"><span class="u-title">Build</span></div>
    </nav>

    <script>
        let manifest = JSON.parse(localStorage.getItem('F40_M')) || [];
        let logs = JSON.parse(localStorage.getItem('F40_L')) || {};
        let activeDate = new Date().toISOString().split('T')[0];
        let activeType = 'fixed';
        let activePickerId = null;

        function init() {
            nav('track');
        }

        function setHabitType(t) {
            activeType = t;
            document.getElementById('type-fixed').className = t==='fixed'?'flex-1 py-3 text-[9px] font-black rounded-lg bg-zinc-800':'flex-1 py-3 text-[9px] font-black text-zinc-600';
            document.getElementById('type-flex').className = t==='flex'?'flex-1 py-3 text-[9px] font-black rounded-lg bg-zinc-800':'flex-1 py-3 text-[9px] font-black text-zinc-600';
            document.getElementById('section-fixed').classList.toggle('hidden', t==='flex');
            document.getElementById('section-flex').classList.toggle('hidden', t==='fixed');
        }

        function nav(v) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.getElementById('n-'+v).classList.add('active');
            if(v==='track') renderTrack(); else renderManifest();
        }

        function getWeekCount(id, ds) {
            const d = new Date(ds); const day = d.getDay() || 7;
            const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
            let c = 0;
            for(let i=0; i<7; i++) {
                const cur = new Date(mon); cur.setDate(mon.getDate()+i);
                const k = cur.toISOString().split('T')[0];
                const l = logs[k]?.[id];
                if(l && (l.c || l.n !== null || l.t.length > 0)) c++;
            }
            return c;
        }

        function renderTrack() {
            const feed = document.getElementById('habit-feed'); feed.innerHTML = '';
            const todayIdx = new Date(activeDate).getDay();
            const target = parseInt(document.getElementById('global-target').value);
            
            const visible = manifest.filter(h => {
                if(h.type === 'fixed') return h.days.includes(todayIdx);
                return getWeekCount(h.id, activeDate) < h.freq || logs[activeDate]?.[h.id];
            });

            let completed = 0, nnFail = false;

            visible.forEach(h => {
                const log = logs[activeDate]?.[h.id] || { n:null, t:[], c:false };
                const isDone = (h.useNum?log.n!==null:true) && (h.useOpt?log.t.length>0:true) && ((!h.useNum&&!h.useOpt)?log.c:true);
                if(isDone) completed++; else if(h.nn) nnFail = true;

                let pills = '';
                // 6. UNIT SPACING FIX
                if(log.n !== null) pills += `<div class="pill">${log.n} ${h.unit}</div>`;
                log.t.forEach(tag => pills += `<div class="pill">${tag}</div>`);

                feed.innerHTML += `
                <div class="habit-card ${h.nn && !isDone ? 'nn-fail' : ''} flex items-center justify-between">
                    <div class="flex-1">
                        <p class="font-black text-sm uppercase ${isDone?'text-white':'text-zinc-700'}">${h.name}</p>
                        ${h.type==='flex'?`<p class="u-title" style="font-size:7px">Week: ${getWeekCount(h.id, activeDate)}/${h.freq}</p>`:''}
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex flex-wrap justify-end" onclick="openPicker('${h.id}')">${pills}</div>
                        <div class="check-box ${isDone?'active':''}" onclick="toggleManual('${h.id}')">${isDone?'✓':''}</div>
                    </div>
                </div>`;
            });

            // 3 & NN LOGIC LIVE UPDATE
            const score = visible.length ? Math.round((completed/visible.length)*100) : 0;
            const finalScore = nnFail ? 0 : score;
            document.getElementById('score-val').innerText = finalScore + '%';
            document.getElementById('score-circle').style.borderColor = finalScore >= target ? 'var(--neon)' : (finalScore > 0 ? 'var(--nn)' : '#222');
            
            document.getElementById('display-date').innerText = new Date(activeDate).toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
            document.getElementById('display-day').innerText = new Date(activeDate).toLocaleDateString('en-GB', {weekday:'long'});
        }

        function openPicker(id) {
            activePickerId = id; const h = manifest.find(x=>x.id===id);
            const log = logs[activeDate]?.[id] || { n:null, t:[], txt:'' };
            document.getElementById('modal-title').innerText = h.name.toUpperCase();
            const content = document.getElementById('modal-content'); content.innerHTML = '';
            
            if(h.useNum) {
                for(let i=h.min; i<=h.max; i+=h.step) {
                    // 6. UNIT SPACING
                    content.innerHTML += `<div class="opt-box ${log.n===i?'active':''}" onclick="selNum(${i})">${i} ${h.unit}</div>`;
                }
            }
            if(h.useOpt) {
                h.tags.forEach(t => {
                    content.innerHTML += `<div class="opt-box ${log.t.includes(t)?'active':''}" onclick="selTag('${t}')">${t}</div>`;
                });
            }
            document.getElementById('modal-text').className = h.useText ? 'mt-auto block bg-zinc-900 p-4 rounded-xl' : 'hidden';
            document.getElementById('picker-modal').style.display = 'flex';
        }

        function selNum(v) { ensureLog(); logs[activeDate][activePickerId].n = v; save(); openPicker(activePickerId); }
        function selTag(t) { 
            ensureLog(); let l = logs[activeDate][activePickerId]; const h = manifest.find(x=>x.id===activePickerId);
            l.t = h.multi ? (l.t.includes(t)?l.t.filter(x=>x!==t):[...l.t,t]) : [t]; 
            save(); openPicker(activePickerId); 
        }

        function saveHabit() {
            const h = { 
                id: 'h'+Date.now(), name: document.getElementById('h-name').value, type: activeType,
                days: Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.day)),
                freq: parseInt(document.getElementById('h-freq').value || 0), nn: document.getElementById('h-nn').checked,
                useNum: document.getElementById('use-num').checked, useOpt: document.getElementById('use-opt').checked, 
                useText: document.getElementById('use-text').checked, min: parseFloat(document.getElementById('h-min').value || 0), 
                max: parseFloat(document.getElementById('h-max').value || 0), step: parseFloat(document.getElementById('h-step').value || 1), 
                unit: document.getElementById('h-unit').value || '', tags: document.getElementById('h-tags').value.split(',').map(t => t.trim()).filter(t => t), 
                multi: document.getElementById('h-multi').checked 
            };
            if(h.name) { 
                manifest.push(h); localStorage.setItem('F40_M', JSON.stringify(manifest)); 
                // 4. RESET FORM
                document.getElementById('h-name').value = '';
                document.getElementById('h-nn').checked = false;
                nav('track'); 
            }
        }

        function conquerDay() { alert("Day Logged. Check Calendar for Heatmap."); renderTrack(); }
        function toggleManual(id) { activePickerId = id; ensureLog(); logs[activeDate][id].c = !logs[activeDate][id].c; save(); }
        function ensureLog() { if(!logs[activeDate]) logs[activeDate] = {}; if(!logs[activeDate][activePickerId]) logs[activeDate][activePickerId] = { n:null, t:[], txt:'', c:false }; }
        function save() { localStorage.setItem('F40_L', JSON.stringify(logs)); renderTrack(); }
        function closeModal() { document.getElementById('picker-modal').style.display = 'none'; }
        function renderManifest() { document.getElementById('manifest-list').innerHTML = manifest.map(h => `<div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center"><span class="font-black text-[10px] uppercase">${h.name}</span><button onclick="delH('${h.id}')">✕</button></div>`).join(''); }
        function delH(id) { if(confirm('Erase?')) { manifest = manifest.filter(x=>x.id!==id); localStorage.setItem('F40_M', JSON.stringify(manifest)); renderManifest(); } }
        
        init();
    </script>
</body>
</html>
