<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE HABIT BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #22c55e; --bg: #000000; --panel: #111111; --border: #222222; --nn: #ef4444; --reset: #f97316; --quote: #f97316; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .fixed-header { position: fixed; top: 0; width: 100%; height: 210px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; padding: 10px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .content-area { margin-top: 220px; margin-bottom: 120px; padding: 15px; }
        
        .stat-circle { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; transition: border-color 0.3s ease; }
        .stat-val { font-size: 13px; font-weight: 900; transition: color 0.3s ease; }
        .stat-lab { font-size: 7px; font-weight: 900; color: #444; text-transform: uppercase; margin-top: 1px; }

        .habit-card { background: var(--panel); border: 1px solid var(--border); border-radius: 1.25rem; margin-bottom: 10px; display: flex; align-items: center; padding: 16px; position: relative; min-height: 85px; justify-content: space-between; }
        .nn-active { border-left: 4px solid var(--nn); }
        .nn-badge { position: absolute; left: 0; top: 0; background: var(--nn); color: white; font-size: 7px; font-weight: 900; padding: 2px 5px; border-bottom-right-radius: 6px; }
        
        .action-zone { display: flex; align-items: center; gap: 8px; }
        .pill-scroll { display: flex; overflow-x: auto; gap: 4px; scrollbar-width: none; max-width: 140px; align-items: center; }
        .pill { background: rgba(34,197,94,0.1); border: 1px solid var(--neon); color: var(--neon); padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; white-space: nowrap; }
        .note-preview-pill { background: rgba(249,115,22,0.1); border: 1px solid var(--reset); color: var(--reset); padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; white-space: nowrap; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
        
        .set-btn { font-size: 10px; font-weight: 900; color: var(--neon); padding: 8px 14px; border: 1px dashed var(--neon); border-radius: 8px; }
        .check-box { width: 44px; height: 44px; border: 2px solid #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .check-box.active { background: var(--neon); border-color: var(--neon); color: #000; }

        .input-dark { background: #0a0a0a; border: 1px solid #222; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .day-btn { width: 100%; aspect-ratio: 1; background: #111; border: 1px solid #222; border-radius: 8px; font-size: 10px; font-weight: 900; color: #444; }
        .day-btn.active { background: var(--neon); color: #000; border-color: var(--neon); }
        .u-title { font-size: 9px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-header-cell { text-align: center; font-size: 10px; font-weight: 900; color: var(--neon); padding-bottom: 10px; }
        .cal-day-cell { aspect-ratio: 1/1; border: 1px solid #222; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 8px; position: relative; font-weight: 800; font-size: 14px; background: #0a0a0a; }
        .cal-perc { position: absolute; bottom: 8px; font-size: 9px; font-weight: 900; opacity: 1; letter-spacing: -0.05em; }

        .fixed-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); display: flex; height: 80px; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .nav-item.active { color: var(--neon); }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 16px; font-weight: 900; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; transition: all 0.2s; }
        .btn-neon { background: var(--neon); color: #000; }
        
        .nav-arrow { font-size: 20px; font-weight: 900; color: #333; padding: 5px; }
        .nav-arrow.active { color: var(--neon); }
        .quote-banner { font-size: 10px; font-weight: 900; letter-spacing: 0.15em; color: var(--quote); text-transform: uppercase; text-align: center; margin-bottom: 2px; }

        .drag-handle { cursor: grab; padding: 0 12px; color: #444; font-size: 18px; display: flex; align-items: center; }
        .dragging { opacity: 0.4; border: 1px solid var(--neon) !important; }

        /* INSIGHTS SPECIFIC */
        .insight-card { background: var(--panel); border: 1px solid var(--border); border-radius: 1rem; padding: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .period-btn { padding: 6px 12px; border-radius: 8px; background: #111; border: 1px solid #222; font-size: 9px; font-weight: 900; color: #555; }
        .period-btn.active { border-color: var(--neon); color: var(--neon); }
    </style>
</head>
<body>

    <div id="view-track">
        <header class="fixed-header">
            <div id="daily-quote" class="quote-banner">---</div>
            <div class="flex items-center gap-4">
                <button onclick="changeDay(-1)" class="nav-arrow active">◂</button>
                <div class="cursor-pointer flex flex-col items-center" onclick="openCalendar()">
                    <p id="head-day" class="u-title text-green-500 mb-0">---</p>
                    <h2 id="head-date" class="text-3xl font-black italic uppercase tracking-tighter">---</h2>
                </div>
                <button id="next-day-btn" onclick="changeDay(1)" class="nav-arrow">▸</button>
            </div>
            <div class="flex gap-3">
                <div id="score-circle" class="stat-circle"><span id="val-score" class="stat-val">0%</span><span class="stat-lab">Score</span></div>
                <div class="stat-circle" style="border-color: var(--neon)"><span class="stat-val text-green-500" id="val-conquer">0/75</span><span class="stat-lab">Conquer</span></div>
                <div class="stat-circle"><span class="stat-val" id="val-gone">0</span><span class="stat-lab">Days By</span></div>
            </div>
        </header>
        <main class="content-area">
            <div id="habit-feed"></div>
            <button onclick="updateAndLock()" class="btn-main btn-neon mt-6 mb-12">UPDATE & LOCK DAY</button>
        </main>
    </div>

    <div id="view-build" class="hidden p-6 pb-32">
        <div class="mb-8 p-4 bg-zinc-900 rounded-2xl border border-zinc-800">
            <h2 class="u-title text-white mb-4 text-center">Campaign Command</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[8px] font-black text-zinc-500 uppercase">Goal Days</label>
                    <input type="number" id="c-goal" class="input-dark p-2 text-sm" placeholder="75" onchange="saveConfig()">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black text-zinc-500 uppercase">Pass Goal %</label>
                    <input type="number" id="c-pass" class="input-dark p-2 text-sm" placeholder="100" onchange="saveConfig()">
                </div>
            </div>
        </div>

        <h2 class="text-xl font-black uppercase italic mb-6 text-center">Constructor</h2>
        <div class="space-y-4" id="form-wrap">
            <input type="text" id="h-name" placeholder="HABIT NAME" class="input-dark font-black">
            <div class="flex bg-zinc-900 p-1 rounded-xl">
                <button id="mode-fixed" class="flex-1 py-3 text-[9px] font-black rounded-lg bg-zinc-800" onclick="setMode('fixed')">FIXED</button>
                <button id="mode-flex" class="flex-1 py-3 text-[9px] font-black text-zinc-500 rounded-lg" onclick="setMode('flex')">FLEXIBLE</button>
            </div>
            <div id="days-row" class="grid grid-cols-7 gap-1">
                <button class="day-btn active" data-d="1" onclick="toggleDay(this)">M</button>
                <button class="day-btn active" data-d="2" onclick="toggleDay(this)">T</button>
                <button class="day-btn active" data-d="3" onclick="toggleDay(this)">W</button>
                <button class="day-btn active" data-d="4" onclick="toggleDay(this)">T</button>
                <button class="day-btn active" data-d="5" onclick="toggleDay(this)">F</button>
                <button class="day-btn active" data-d="6" onclick="toggleDay(this)">S</button>
                <button class="day-btn active" data-d="0" onclick="toggleDay(this)">S</button>
            </div>
            <div id="flex-row" class="hidden"><input type="number" id="h-freq" placeholder="Times/Week" class="input-dark"></div>
            <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-xl"><span class="u-title text-white">Non-Negotiable</span><input type="checkbox" id="h-nn" class="w-5 h-5 accent-green-500"></div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="p-3 bg-zinc-900 rounded-xl space-y-2">
                    <div class="flex justify-between items-center"><span class="u-title text-white">Numeric</span><input type="checkbox" id="h-useNum" class="w-5 h-5 accent-green-500"></div>
                    <div class="grid grid-cols-2 gap-1">
                        <input type="number" id="h-min" placeholder="Min" class="input-dark text-[10px] p-2">
                        <input type="number" id="h-max" placeholder="Max" class="input-dark text-[10px] p-2">
                        <input type="number" id="h-step" placeholder="Step" class="input-dark text-[10px] p-2">
                        <input type="text" id="h-unit" placeholder="Unit" class="input-dark text-[10px] p-2">
                    </div>
                </div>
                <div class="p-3 bg-zinc-900 rounded-xl space-y-2">
                    <div class="flex justify-between items-center"><span class="u-title text-white">Tags</span><input type="checkbox" id="h-useOpt" class="w-5 h-5 accent-green-500"></div>
                    <textarea id="h-tags" placeholder="Tag 1, Tag 2..." class="input-dark text-xs h-20"></textarea>
                </div>
            </div>

            <div class="flex gap-4 p-4 bg-zinc-900 rounded-xl">
                <label class="flex items-center gap-2 u-title text-white">Multi <input type="checkbox" id="h-multi" class="w-5 h-5 accent-green-500"></label>
                <label class="flex items-center gap-2 u-title text-white">Notes <input type="checkbox" id="h-notes" class="w-5 h-5 accent-green-500"></label>
            </div>
            <button onclick="saveHabit()" id="forge-btn" class="w-full py-5 bg-white text-black font-black rounded-2xl uppercase text-[10px]">Forge Habit</button>
            <button onclick="resetBuilder()" id="cancel-btn" class="hidden w-full py-2 text-zinc-600 font-bold text-[9px]">CANCEL EDIT</button>
        </div>
        <div id="manifest-list" class="mt-8 space-y-2"></div>
    </div>

    <div id="view-insights" class="hidden p-6 pb-32">
        <h2 class="text-xl font-black uppercase italic mb-6 text-center">Intelligence</h2>
        <div class="flex gap-2 overflow-x-auto pb-4 mb-4 scrollbar-width:none">
            <button class="period-btn active" data-p="7" onclick="setPeriod(7)">7D</button>
            <button class="period-btn" data-p="14" onclick="setPeriod(14)">14D</button>
            <button class="period-btn" data-p="21" onclick="setPeriod(21)">21D</button>
            <button class="period-btn" data-p="30" onclick="setPeriod(30)">30D</button>
            <button class="period-btn" data-p="all" onclick="setPeriod('all')">ALL</button>
            <input type="number" id="custom-p" placeholder="Days" class="bg-zinc-900 border border-zinc-800 text-[9px] font-black rounded-lg p-1 w-16 outline-none" onchange="setPeriod(this.value)">
        </div>
        <div id="insights-list" class="space-y-2"></div>
        <button onclick="openBackup()" class="w-full py-4 mt-12 bg-zinc-900 border border-zinc-800 rounded-xl text-[9px] font-black text-zinc-500 uppercase tracking-widest">Data Backup & Recovery</button>
    </div>

    <div id="mod-pick" class="modal">
        <div class="flex justify-between items-center mb-6"><button onclick="clearEntry(event)" class="text-orange-500 text-3xl font-black">↻</button><h3 id="pick-title" class="u-title text-white">LOG</h3><button onclick="closePickerFinal(event)" class="text-green-500 text-3xl font-black">✓</button></div>
        <div id="pick-options" class="grid grid-cols-2 gap-3 mb-6"></div>
        <div id="notes-container" class="hidden space-y-2"><span class="u-title">Notes</span><textarea id="pick-notes" class="input-dark h-32 focus:border-green-500" placeholder="Type notes here..."></textarea></div>
    </div>

    <div id="mod-cal" class="modal">
        <div class="flex justify-between items-center mb-6"><button onclick="closeM('mod-cal')" class="text-2xl">✕</button><div class="text-center"><p id="cal-head-day" class="u-title text-green-500 mb-0">---</p><h2 id="cal-head-date" class="text-xl font-black uppercase italic tracking-tighter">---</h2></div><div class="w-8"></div></div>
        <div class="cal-grid mb-2"><div class="cal-header-cell">M</div><div class="cal-header-cell">T</div><div class="cal-header-cell">W</div><div class="cal-header-cell">T</div><div class="cal-header-cell">F</div><div class="cal-header-cell">S</div><div class="cal-header-cell">S</div></div>
        <div id="cal-grid" class="cal-grid"></div>
    </div>

    <div id="mod-backup" class="modal">
        <div class="flex justify-between items-center mb-6"><button onclick="closeM('mod-backup')" class="text-2xl">✕</button><h3 class="u-title text-white text-center">Black Box</h3><div class="w-8"></div></div>
        <p class="text-[10px] text-zinc-500 mb-4 text-center">Copy string to notes. Paste here to restore.</p>
        <textarea id="backup-text" class="input-dark h-64 text-[10px] mb-4 font-mono"></textarea>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="copyBackup()" class="btn-main bg-zinc-800 text-white">Copy Backup</button>
            <button onclick="restoreBackup()" class="btn-main bg-red-900/30 border border-red-500 text-red-500">Restore</button>
        </div>
    </div>

    <nav class="fixed-nav">
        <div class="nav-item active" id="n-track" onclick="nav('track')">Track</div>
        <div class="nav-item" id="n-build" onclick="nav('build')">Build</div>
        <div class="nav-item" id="n-insights" onclick="nav('insights')">Insights</div>
    </nav>

    <script>
        let manifest = JSON.parse(localStorage.getItem('M_BREAD_V10')) || [];
        let logs = JSON.parse(localStorage.getItem('L_BREAD_V10')) || {};
        let config = JSON.parse(localStorage.getItem('C_BREAD_V10')) || { goal: 75, pass: 100 };
        let activeDate = new Date().toISOString().split('T')[0];
        let todayStr = new Date().toISOString().split('T')[0];
        let buildMode = 'fixed', editId = null, curHId = null, insightPeriod = 7;

        const quotes = ["DISCIPLINE OR REGRET", "WIN THE DAY", "KILL THE EXCUSE", "SURE OR JUST MAYBE?", "OWN YOUR LIFE", "DO THE WORK", "NO WAY OUT BUT THROUGH", "STAY HARD"];
        function setQuote() { document.getElementById('daily-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)]; }

        function changeDay(offset) {
            let d = new Date(activeDate); d.setDate(d.getDate() + offset);
            let target = d.toISOString().split('T')[0];
            if (target > todayStr) return;
            activeDate = target; setQuote(); renderTrack();
        }

        function saveConfig() { 
            config.goal = parseInt(document.getElementById('c-goal').value) || 75;
            config.pass = parseInt(document.getElementById('c-pass').value) || 100;
            localStorage.setItem('C_BREAD_V10', JSON.stringify(config));
            renderTrack();
        }

        function nav(v) {
            document.querySelectorAll('.hidden').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('n-'+v).classList.add('active');
            if(v==='build') { document.getElementById('c-goal').value = config.goal; document.getElementById('c-pass').value = config.pass; renderManifest(); }
            else if(v==='insights') { renderInsights(); }
            else { renderTrack(); }
        }

        function setMode(m) {
            buildMode = m;
            document.getElementById('mode-fixed').classList.toggle('bg-zinc-800', m==='fixed');
            document.getElementById('mode-flex').classList.toggle('bg-zinc-800', m==='flex');
            document.getElementById('days-row').classList.toggle('hidden', m==='flex');
            document.getElementById('flex-row').classList.toggle('hidden', m==='fixed');
        }

        function toggleDay(btn) { btn.classList.toggle('active'); }

        function saveHabit() {
            const h = { id: editId || 'h' + Date.now(), name: document.getElementById('h-name').value, type: buildMode, days: Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.d)), freq: parseInt(document.getElementById('h-freq').value || 0), nn: document.getElementById('h-nn').checked, useNum: document.getElementById('h-useNum').checked, min: parseFloat(document.getElementById('h-min').value || 0), max: parseFloat(document.getElementById('h-max').value || 0), step: parseFloat(document.getElementById('h-step').value || 1), unit: document.getElementById('h-unit').value, useOpt: document.getElementById('h-useOpt').checked, tags: document.getElementById('h-tags').value.split(',').map(t => t.trim()).filter(t => t), multi: document.getElementById('h-multi').checked, notes: document.getElementById('h-notes').checked };
            if(!h.name) return;
            editId ? manifest[manifest.findIndex(x => x.id === editId)] = h : manifest.push(h);
            localStorage.setItem('M_BREAD_V10', JSON.stringify(manifest));
            resetBuilder(); nav('track');
        }

        function renderTrack() {
            const feed = document.getElementById('habit-feed'); feed.innerHTML = '';
            const curr = new Date(activeDate);
            const dayIdx = curr.getDay();
            
            // Get Monday of current week for Flexible counter
            const first = curr.getDate() - (dayIdx === 0 ? 6 : dayIdx - 1);
            const monday = new Date(new Date(curr).setDate(first));
            
            const habits = manifest.filter(h => h.type==='fixed' ? h.days.includes(dayIdx) : true);
            habits.forEach(h => {
                const l = logs[activeDate]?.[h.id] || { done: false, n: null, t: [], notes: '' };
                let flexCounter = '';
                if(h.type === 'flex') {
                    let count = 0;
                    for(let i=0; i<7; i++) {
                        let d = new Date(monday); d.setDate(monday.getDate() + i);
                        if(logs[d.toISOString().split('T')[0]]?.[h.id]?.done) count++;
                    }
                    flexCounter = `<span class="ml-2 text-[10px] text-zinc-500 font-black">${count}/${h.freq}</span>`;
                }

                let pills = '';
                if(l.n !== null) pills += `<div class="pill">${l.n}${h.unit}</div>`;
                if(l.t) l.t.forEach(t => pills += `<div class="pill">${t}</div>`);
                if(l.notes) { const trunc = l.notes.length > 15 ? l.notes.substring(0, 12) + '...' : l.notes; pills += `<div class="note-preview-pill">📝 ${trunc}</div>`; }
                
                feed.innerHTML += `<div class="habit-card ${h.nn ? 'nn-active' : ''}">${h.nn ? '<div class="nn-badge">NN</div>' : ''}<div class="flex-1 mr-4 overflow-hidden" onclick="openPicker('${h.id}')"><p class="font-bold text-sm uppercase truncate">${h.name}${flexCounter}</p></div><div class="action-zone">${(l.n!==null || l.t.length || l.notes) ? `<div class="pill-scroll" onclick="openPicker('${h.id}')">${pills}</div>` : ((h.useNum || h.useOpt || h.notes) ? `<div class="set-btn" onclick="openPicker('${h.id}')">SET</div>` : '')}<div class="check-box ${l.done ? 'active' : ''}" onclick="toggleCheck('${h.id}')">${l.done?'✓':''}</div></div></div>`;
            });
            syncHeader();
        }

        function getDailyStatus(ds) {
            const di = new Date(ds).getDay();
            const habits = manifest.filter(h => h.type==='fixed' ? h.days.includes(di) : true);
            if(!habits.length) return { score: 100, pass: true };
            let done = 0, nnDone = true;
            habits.forEach(h => { const l = logs[ds]?.[h.id]; if(l?.done) done++; if(h.nn && !l?.done) nnDone = false; });
            const score = Math.round((done / habits.length) * 100);
            return { score, pass: (nnDone && score >= config.pass) };
        }

        function syncHeader() {
            const d = new Date(activeDate);
            document.getElementById('head-date').innerText = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            document.getElementById('head-day').innerText = d.toLocaleDateString('en-GB', { weekday: 'long' });
            document.getElementById('next-day-btn').classList.toggle('active', activeDate < todayStr);
            const s = getDailyStatus(activeDate);
            const scoreVal = document.getElementById('val-score');
            const scoreCirc = document.getElementById('score-circle');
            scoreVal.innerText = s.score + '%';
            scoreVal.classList.remove('text-red-500', 'text-orange-500', 'text-green-500');
            scoreCirc.style.borderColor = '#222';
            if (s.score >= config.pass) { scoreVal.classList.add('text-green-500'); scoreCirc.style.borderColor = 'var(--neon)'; }
            else if (s.score > (config.pass / 2)) { scoreVal.classList.add('text-orange-500'); scoreCirc.style.borderColor = 'var(--reset)'; }
            else { scoreVal.classList.add('text-red-500'); scoreCirc.style.borderColor = 'var(--nn)'; }
            let conquered = 0; Object.keys(logs).forEach(date => { if(getDailyStatus(date).pass) conquered++; });
            document.getElementById('val-conquer').innerText = `${conquered}/${config.goal}`;
            const allDates = Object.keys(logs).sort();
            document.getElementById('val-gone').innerText = allDates.length ? Math.ceil(Math.abs(new Date() - new Date(allDates[0]))/86400000) : 0;
        }

        function setPeriod(p) { insightPeriod = p; document.querySelectorAll('.period-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.p == p)); renderInsights(); }
        function renderInsights() {
            const list = document.getElementById('insights-list'); list.innerHTML = '';
            let dateRange = []; const end = new Date(todayStr); let start = new Date(todayStr);
            if(insightPeriod === 'all') { const allKeys = Object.keys(logs).sort(); if(allKeys.length) start = new Date(allKeys[0]); }
            else { start.setDate(end.getDate() - (parseInt(insightPeriod) - 1)); }
            for(let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) { dateRange.push(d.toISOString().split('T')[0]); }
            manifest.forEach(h => {
                let completions = 0, numericSum = 0, numericCount = 0, target = 0;
                dateRange.forEach(ds => {
                    const l = logs[ds]?.[h.id]; const dIdx = new Date(ds).getDay();
                    if(h.type === 'fixed') { if(h.days.includes(dIdx)) target++; } else { target += (h.freq / 7); }
                    if(l?.done) { completions++;
                        if(h.useNum && l.n !== null) { numericSum += l.n; numericCount++; }
                        if(h.useOpt && l.t.length) { l.t.forEach(t => { let match = t.match(/(\d+(\.\d+)?)/); if(match) { numericSum += parseFloat(match[0]); numericCount++; } }); }
                    }
                });
                const perf = target > 0 ? Math.round((completions / target) * 100) : 0;
                const avg = numericCount > 0 ? (numericSum / numericCount).toFixed(1) : null;
                list.innerHTML += `<div class="insight-card"><div><p class="font-black uppercase text-[10px] text-white mb-1">${h.name}</p><p class="text-[8px] font-bold text-zinc-500 uppercase">${h.type}</p></div><div class="text-right"><p class="text-xs font-black ${perf >= 100 ? 'text-green-500' : 'text-zinc-300'}">${perf}%</p>${avg ? `<p class="text-[9px] font-black text-orange-500">${avg}${h.unit || ''} AVG</p>` : ''}</div></div>`;
            });
        }

        function openBackup() { const data = { M: manifest, L: logs, C: config }; document.getElementById('backup-text').value = btoa(JSON.stringify(data)); document.getElementById('mod-backup').style.display = 'flex'; }
        function copyBackup() { const txt = document.getElementById('backup-text'); txt.select(); document.execCommand('copy'); alert('Copied'); }
        function restoreBackup() { if(!confirm('Overwrite data?')) return; try { const decoded = JSON.parse(atob(document.getElementById('backup-text').value)); if(decoded.M && decoded.L && decoded.C) { localStorage.setItem('M_BREAD_V10', JSON.stringify(decoded.M)); localStorage.setItem('L_BREAD_V10', JSON.stringify(decoded.L)); localStorage.setItem('C_BREAD_V10', JSON.stringify(decoded.C)); window.location.reload(); } } catch(e) { alert('Error'); } }

        function renderManifest() {
            const list = document.getElementById('manifest-list'); list.innerHTML = '';
            manifest.forEach((h, index) => {
                const item = document.createElement('div');
                item.className = 'p-4 bg-zinc-900 rounded-xl flex justify-between border border-zinc-800 items-center draggable-item';
                item.draggable = true; item.dataset.index = index;
                item.innerHTML = `<div class="flex items-center"><div class="drag-handle">≡</div><span class="font-black uppercase text-[10px] ml-2">${h.name}</span></div><div class="flex gap-4"><button onclick="loadEdit('${h.id}')" class="text-zinc-500 font-black text-[9px]">EDIT</button><button onclick="delH('${h.id}')" class="text-red-500 font-black text-[10px]">✕</button></div>`;
                item.addEventListener('dragstart', (e) => { e.target.classList.add('dragging'); e.dataTransfer.setData('text/plain', index); });
                item.addEventListener('drop', (e) => { e.preventDefault(); const from = e.dataTransfer.getData('text/plain'); const moved = manifest.splice(from, 1)[0]; manifest.splice(index, 0, moved); localStorage.setItem('M_BREAD_V10', JSON.stringify(manifest)); renderManifest(); });
                item.addEventListener('dragover', (e) => e.preventDefault());
                list.appendChild(item);
            });
        }

        function updateAndLock() { localStorage.setItem('L_BREAD_V10', JSON.stringify(logs)); renderTrack(); }
        function openPicker(id) { curHId = id; const h = manifest.find(x => x.id === id); ensureL(id); const l = logs[activeDate][id]; document.getElementById('pick-title').innerText = h.name; renderPickerOptions(); const nBox = document.getElementById('notes-container'); const nInput = document.getElementById('pick-notes'); if(h.notes) { nBox.classList.remove('hidden'); nInput.value = l.notes || ''; nInput.oninput = (e) => { logs[activeDate][curHId].notes = e.target.value; }; } else { nBox.classList.add('hidden'); } document.getElementById('mod-pick').style.display = 'flex'; }
        function renderPickerOptions() { const h = manifest.find(x => x.id === curHId); const l = logs[activeDate][curHId]; const cont = document.getElementById('pick-options'); cont.innerHTML = ''; if(h.useNum) { for(let i=h.min; i<=h.max; i+=h.step) { cont.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl border ${l.n == i ? 'border-green-500 text-green-500' : 'border-zinc-800'} text-center font-bold" onclick="setN(${i})">${i}</div>`; } } if(h.useOpt) { h.tags.forEach(t => { cont.innerHTML += `<div class="p-4 bg-zinc-900 rounded-xl border ${l.t.includes(t) ? 'border-green-500 text-green-500' : 'border-zinc-800'} text-center font-bold" onclick="setT('${t}')">${t}</div>`; }); } }
        function setN(v) { logs[activeDate][curHId].n = v; logs[activeDate][curHId].done = true; renderPickerOptions(); }
        function setT(t) { const h = manifest.find(x => x.id === curHId); let tags = logs[activeDate][curHId].t || []; tags = h.multi ? (tags.includes(t) ? tags.filter(x => x !== t) : [...tags, t]) : [t]; logs[activeDate][curHId].t = tags; logs[activeDate][curHId].done = true; renderPickerOptions(); }
        function clearEntry() { logs[activeDate][curHId] = { done: false, n: null, t: [], notes: '' }; openPicker(curHId); }
        function closePickerFinal() { document.getElementById('mod-pick').style.display = 'none'; renderTrack(); }
        function ensureL(id) { if(!logs[activeDate]) logs[activeDate] = {}; if(!logs[activeDate][id]) logs[activeDate][id] = { done: false, n: null, t: [], notes: '' }; }
        function toggleCheck(id) { ensureL(id); logs[activeDate][id].done = !logs[activeDate][id].done; renderTrack(); }
        function closeM(m) { document.getElementById(m).style.display = 'none'; renderTrack(); }
        function openCalendar() {
            const g = document.getElementById('cal-grid'); g.innerHTML = ''; const now = new Date(activeDate);
            const startDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay(); const offset = startDay === 0 ? 6 : startDay - 1;
            const last = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for(let i=0; i<offset; i++) g.innerHTML += `<div></div>`;
            for(let d=1; d<=last; d++) {
                const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const r = getDailyStatus(ds); let sty = logs[ds] ? (r.pass ? 'border-color:var(--neon); background:rgba(34,197,94,0.1); color:var(--neon);' : 'border-color:var(--nn); background:rgba(239,68,68,0.1); color:var(--nn);') : '';
                g.innerHTML += `<div class="cal-day-cell ${ds === todayStr ? 'ring-2 ring-white' : ''}" style="${sty}" onclick="activeDate='${ds}'; closeM('mod-cal');">${d}${logs[ds] ? `<span class="cal-perc">${r.score}%</span>` : ''}</div>`;
            }
            document.getElementById('mod-cal').style.display = 'flex';
        }
        function loadEdit(id) { editId = id; const h = manifest.find(x => x.id === id); document.getElementById('h-name').value = h.name; setMode(h.type); document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', h.days.includes(parseInt(b.dataset.d)))); document.getElementById('h-freq').value = h.freq; document.getElementById('h-nn').checked = h.nn; document.getElementById('h-useNum').checked = h.useNum; document.getElementById('h-min').value = h.min; document.getElementById('h-max').value = h.max; document.getElementById('h-step').value = h.step || 1; document.getElementById('h-unit').value = h.unit; document.getElementById('h-useOpt').checked = h.useOpt; document.getElementById('h-tags').value = h.tags.join(', '); document.getElementById('h-multi').checked = h.multi; document.getElementById('h-notes').checked = h.notes; document.getElementById('forge-btn').innerText = "UPDATE"; document.getElementById('cancel-btn').classList.remove('hidden'); nav('build'); }
        function resetBuilder() { editId = null; document.getElementById('form-wrap').querySelectorAll('input, textarea').forEach(el => el.type==='checkbox'?el.checked=false:el.value=''); document.getElementById('forge-btn').innerText="Forge Habit"; document.getElementById('cancel-btn').classList.add('hidden'); }
        function delH(id) { if(confirm('Delete?')) { manifest = manifest.filter(x => x.id !== id); localStorage.setItem('M_BREAD_V10', JSON.stringify(manifest)); renderManifest(); } }
        setQuote(); nav('track');
    </script>
</body>
</html>
